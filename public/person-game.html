<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>خمّن الشخصية - تحكم</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
<script src="/socket.io/socket.io.js"></script>
<style>
  :root { --bg:#0d0d14; --surface:#181824; --surface2:#242436; --border:#2d2d40; --text:#f0f0f5; --muted:#9a9ab0; --accent:#ff0050; --accent2:#25f4ee; }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--bg); color:var(--text); font-family:'Tajawal',sans-serif; padding:20px; min-height:100vh; }
  .wrap { max-width:900px; margin:0 auto; display:flex; flex-direction:column; gap:14px; }
  .header { display:flex; justify-content:space-between; align-items:center; padding:14px 18px; background:var(--surface); border-radius:12px; }
  .header h1 { font-size:22px; }
  .status-badge { font-size:12px; padding:4px 12px; border-radius:20px; background:var(--surface2); color:var(--muted); }
  .status-badge.active { background:#1dba72; color:#fff; }
  .card { background:var(--surface); border-radius:14px; padding:16px; border:1px solid var(--border); }
  .card-title { font-size:15px; font-weight:700; margin-bottom:12px; color:var(--accent2); }
  .cats { display:flex; flex-wrap:wrap; gap:6px; margin-bottom:14px; }
  .cat { padding:6px 14px; background:var(--surface2); border-radius:16px; font-size:12px; cursor:pointer; border:1px solid var(--border); }
  .cat.active { background:var(--accent); color:#fff; border-color:var(--accent); }
  .current-person { display:flex; gap:14px; align-items:center; padding:16px; background:var(--surface2); border-radius:12px; }
  .current-person img { width:80px; height:80px; border-radius:12px; object-fit:cover; background:#333; }
  .cp-info { flex:1; }
  .cp-name { font-size:18px; font-weight:900; color:var(--accent2); }
  .cp-cat { font-size:12px; color:var(--muted); margin-top:2px; }
  .cp-hint { margin-top:8px; padding:8px 12px; background:rgba(37,244,238,.1); border:1px solid rgba(37,244,238,.3); border-radius:8px; font-size:13px; }
  .actions { display:flex; gap:8px; flex-wrap:wrap; }
  .btn { padding:10px 16px; border:none; border-radius:10px; font-family:inherit; font-weight:700; cursor:pointer; font-size:14px; transition:all .15s; }
  .btn:disabled { opacity:.4; cursor:not-allowed; }
  .btn-start { background:#1dba72; color:#fff; flex:1; }
  .btn-stop  { background:var(--accent); color:#fff; flex:1; }
  .btn-hint  { background:#f59e0b; color:#fff; flex:1; }
  .btn-next  { background:var(--accent2); color:#000; flex:1; }
  .btn-reveal { background:#a78bfa; color:#fff; flex:1; }
  .leaders { display:flex; flex-direction:column; gap:6px; }
  .leader-item { display:flex; align-items:center; gap:10px; padding:8px 12px; background:var(--surface2); border-radius:10px; }
  .leader-rank { width:28px; height:28px; border-radius:50%; background:var(--accent); color:#fff; display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:900; }
  .leader-av { width:32px; height:32px; border-radius:50%; overflow:hidden; background:var(--surface); display:flex; align-items:center; justify-content:center; font-size:14px; }
  .leader-av img { width:100%; height:100%; object-fit:cover; }
  .leader-name { flex:1; font-weight:700; font-size:13px; }
  .leader-word { font-size:12px; color:var(--accent2); font-weight:900; background:rgba(37,244,238,.12); padding:2px 8px; border-radius:12px; }
  .empty-leaders { padding:20px; text-align:center; color:var(--muted); font-size:13px; }
  .overlay-link { background:var(--surface2); padding:10px; border-radius:8px; font-family:monospace; font-size:12px; word-break:break-all; cursor:pointer; }
</style>
</head>
<body>

<div class="wrap">
  <div class="header">
    <h1>🎭 خمّن الشخصية</h1>
    <span class="status-badge" id="status-badge">متوقف</span>
  </div>

  <div class="card">
    <div class="card-title">الفئات</div>
    <div class="cats" id="cats"></div>
    <div style="font-size:12px;color:var(--muted);margin-top:8px" id="pool-count"></div>
  </div>

  <div class="card">
    <div class="card-title">الشخصية الحالية</div>
    <div class="current-person" id="current-person" style="display:none">
      <img id="cp-img" src="" onerror="this.style.display='none'">
      <div class="cp-info">
        <div class="cp-name" id="cp-name">—</div>
        <div class="cp-cat" id="cp-cat">—</div>
        <div class="cp-hint" id="cp-hint">—</div>
        <div style="font-size:11px;color:var(--muted);margin-top:4px" id="cp-hint-idx">—</div>
      </div>
    </div>
    <div id="no-person" style="text-align:center;padding:16px;color:var(--muted);font-size:13px">اضغط "ابدأ" لاختيار شخصية عشوائية</div>

    <div class="actions" style="margin-top:12px">
      <button class="btn btn-start" id="start-btn" onclick="startGame()">▶ ابدأ (عشوائي)</button>
      <button class="btn btn-stop"  id="stop-btn"  onclick="stopGame()" disabled>⏹ إيقاف</button>
    </div>
    <div class="actions" style="margin-top:8px">
      <button class="btn btn-hint"   id="hint-btn"   onclick="nextHint()" disabled>💡 تلميح جديد</button>
      <button class="btn btn-reveal" id="reveal-btn" onclick="revealAnswer()" disabled>👁 أظهر</button>
      <button class="btn btn-next"   id="next-btn"   onclick="nextPerson()" disabled>⏭ شخصية تالية</button>
    </div>
  </div>

  <div class="card">
    <div class="card-title">⚙️ إعدادات الـ Overlay</div>
    <div style="margin-bottom:14px">
      <div style="font-size:12px;color:var(--muted);margin-bottom:8px">حجم الخط في الـ overlay:</div>
      <div style="display:flex;gap:6px;align-items:center">
        <button class="btn" style="flex:0 0 42px;background:var(--surface2);border:1px solid var(--border);color:#fff;padding:8px;font-size:16px" onclick="changeScale(-0.1)">−</button>
        <span id="scale-val" style="flex:1;text-align:center;font-weight:700;color:var(--accent2)">100%</span>
        <button class="btn" style="flex:0 0 42px;background:var(--surface2);border:1px solid var(--border);color:#fff;padding:8px;font-size:16px" onclick="changeScale(0.1)">+</button>
        <button class="btn" style="flex:0 0 42px;background:var(--surface2);border:1px solid var(--border);color:var(--muted);padding:8px;font-size:14px" onclick="changeScale(0)">↺</button>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="card-title">🏅 فائزي الجولة</div>
    <div class="leaders" id="winners-list"><div class="empty-leaders">لا يوجد فائزين بعد</div></div>
  </div>

  <div class="card">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
      <div class="card-title" style="margin-bottom:0">📊 كل المستخدمين</div>
      <button class="btn" style="font-size:12px;padding:4px 12px;background:var(--surface2);border:1px solid var(--border);color:var(--muted)" onclick="clearAllStats()">مسح الكل</button>
    </div>
    <div class="leaders" id="all-players-list" style="max-height:400px;overflow-y:auto"><div class="empty-leaders">لا يوجد مستخدمين بعد</div></div>
  </div>

  <div class="card">
    <div class="card-title">رابط OBS</div>
    <div class="overlay-link" id="overlay-link" onclick="copyLink()">...</div>
    <div style="font-size:11px;color:var(--muted);margin-top:6px">اضغط لنسخ</div>
  </div>
</div>

// استخدام السيرفر كـ proxy لتجاوز hotlink protection
function wikiImg(filename) {
  const url = 'https://en.wikipedia.org/wiki/Special:FilePath/' + encodeURIComponent(filename) + '?width=500';
  return '/api/img-proxy?url=' + encodeURIComponent(url);
}

// placeholder لشخصيات بدون صور Wikipedia - SVG data URI
function placeholder(name, color) {
  const c = color || '#2d2d5e';
  const letter = name[0];
  return `data:image/svg+xml,${encodeURIComponent(`<svg xmlns="http://www.w3.org/2000/svg" width="500" height="500"><rect width="500" height="500" fill="${c}"/><text x="250" y="280" text-anchor="middle" font-size="200" font-weight="900" fill="rgba(255,255,255,0.3)" font-family="sans-serif">${letter}</text></svg>`)}`;
}

const VALID_PEOPLE = PEOPLE.filter(p => p.image && p.hints.length);
const CATS = ['الكل', ...new Set(VALID_PEOPLE.map(p => p.category))];

const params   = new URLSearchParams(location.search);
const username = params.get('username') || '';
const socket   = io();
let selectedCat  = 'الكل';
let filteredPool = [...VALID_PEOPLE];
let currentPerson = null;

document.getElementById('overlay-link').textContent = `${location.origin}/person-overlay.html?username=${username}`;

const catsEl = document.getElementById('cats');
CATS.forEach(cat => {
  const el = document.createElement('div');
  el.className = 'cat' + (cat === 'الكل' ? ' active' : '');
  el.textContent = cat;
  el.onclick = () => {
    selectedCat = cat;
    document.querySelectorAll('.cat').forEach(c => c.classList.remove('active'));
    el.classList.add('active');
    filteredPool = cat === 'الكل' ? [...VALID_PEOPLE] : VALID_PEOPLE.filter(p => p.category === cat);
    document.getElementById('pool-count').textContent = `${filteredPool.length} شخصية متاحة`;
  };
  catsEl.appendChild(el);
});
document.getElementById('pool-count').textContent = `${filteredPool.length} شخصية متاحة`;

if (username) socket.emit('join', { username });

let overlayScale = 1;
async function changeScale(delta) {
  if (delta === 0) overlayScale = 1;
  else overlayScale = Math.max(0.6, Math.min(2, overlayScale + delta));
  document.getElementById('scale-val').textContent = Math.round(overlayScale * 100) + '%';
  await fetch('/api/person/scale', {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({ username, scale: overlayScale }),
  });
}

socket.on('person:won', ({ winner, winners, allPlayers }) => {
  renderWinners(winners || []);
  if (allPlayers) renderAllPlayers(allPlayers);
});

socket.on('person:started', (data) => {
  setActive(true);
  // لو الانتقال من زر "التالي" يجي السيرفر يبث started — اجلب الحالة
  fetch(`/api/person/${username}`).then(r => r.json()).then(d => {
    if (d.person) {
      const p = filteredPool.find(pp => pp.image === d.person.image);
      if (p) { currentPerson = p; showCurrentPerson(p, d.person.hintIndex, d.person.totalHints); }
    }
  });
  renderWinners([]);
});

socket.on('person:hint', ({ hint, hintIndex }) => {
  if (currentPerson) {
    document.getElementById('cp-hint').textContent = `💡 ${hint}`;
    document.getElementById('cp-hint-idx').textContent = `تلميح ${hintIndex + 1} من ${currentPerson.hints.length}`;
  }
});

socket.on('person:stopped', () => setActive(false));

function startGame() {
  if (!filteredPool.length) return alert('لا توجد شخصيات في هذه الفئة');
  const person = filteredPool[Math.floor(Math.random() * filteredPool.length)];
  currentPerson = person;
  fetch('/api/person/start', {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({ username, person, pool: filteredPool }),
  }).then(r => r.json()).then(data => {
    if (data.ok) { setActive(true); showCurrentPerson(person, 0, person.hints.length); }
  });
}

async function stopGame() {
  await fetch('/api/person/stop', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ username }) });
  setActive(false);
}

async function nextHint() {
  const res = await fetch('/api/person/next-hint', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ username }) });
  const data = await res.json();
  if (data.ok && currentPerson) {
    document.getElementById('cp-hint').textContent = `💡 ${currentPerson.hints[data.hintIndex]}`;
    document.getElementById('cp-hint-idx').textContent = `تلميح ${data.hintIndex + 1} من ${currentPerson.hints.length}`;
  }
}

async function revealAnswer() {
  await fetch('/api/person/reveal', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ username }) });
}

async function nextPerson() {
  const res = await fetch('/api/person/next', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ username }) });
  const data = await res.json();
  if (data.ok) {
    fetch(`/api/person/${username}`).then(r => r.json()).then(d => {
      if (d.person) {
        const p = filteredPool.find(pp => pp.image === d.person.image);
        if (p) { currentPerson = p; showCurrentPerson(p, 0, p.hints.length); }
      }
    });
  }
}

async function clearAllStats() {
  if (!confirm('مسح كل النقاط؟')) return;
  await fetch('/api/person/clear-stats', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ username }) });
  renderAllPlayers([]);
}

function setActive(active) {
  document.getElementById('status-badge').textContent = active ? '🟢 نشط' : 'متوقف';
  document.getElementById('status-badge').classList.toggle('active', active);
  document.getElementById('start-btn').disabled = active;
  document.getElementById('stop-btn').disabled  = !active;
  document.getElementById('hint-btn').disabled  = !active;
  document.getElementById('reveal-btn').disabled = !active;
  document.getElementById('next-btn').disabled   = !active;
}

function showCurrentPerson(p, hintIdx, totalHints) {
  if (!p) return;
  document.getElementById('current-person').style.display = 'flex';
  document.getElementById('no-person').style.display = 'none';
  document.getElementById('cp-img').src = p.image;
  document.getElementById('cp-img').style.opacity = '1';
  document.getElementById('cp-name').textContent = p.name;
  document.getElementById('cp-cat').textContent = p.category;
  document.getElementById('cp-hint').textContent = `💡 ${p.hints[hintIdx || 0]}`;
  document.getElementById('cp-hint-idx').textContent = `تلميح ${(hintIdx || 0) + 1} من ${totalHints || p.hints.length}`;
}

function renderWinners(winners) {
  const el = document.getElementById('winners-list');
  if (!winners.length) { el.innerHTML = '<div class="empty-leaders">لا يوجد فائزين بعد</div>'; return; }
  el.innerHTML = winners.map((w, i) => `
    <div class="leader-item">
      <span class="leader-rank">${i+1}</span>
      <div class="leader-av">${w.avatar ? `<img src="${w.avatar}" onerror="this.parentElement.textContent='${esc(w.name[0])}'">` : esc(w.name[0])}</div>
      <span class="leader-name">${esc(w.name)}</span>
      <span class="leader-word">${w.totalPersons} 🎭</span>
    </div>`).join('');
}

function renderAllPlayers(players) {
  const list = document.getElementById('all-players-list');
  if (!players.length) { list.innerHTML = '<div class="empty-leaders">لا يوجد مستخدمين بعد</div>'; return; }
  list.innerHTML = players.map((p, i) => `
    <div class="leader-item">
      <span class="leader-rank">${i+1}</span>
      <div class="leader-av">${p.avatar ? `<img src="${p.avatar}" onerror="this.parentElement.textContent='${esc(p.name[0])}'">` : esc(p.name[0])}</div>
      <span class="leader-name">${esc(p.name)}</span>
      <span class="leader-word">${p.totalPersons} 🎭</span>
    </div>`).join('');
}

function copyLink() {
  const text = document.getElementById('overlay-link').textContent;
  navigator.clipboard.writeText(text);
}

function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

if (username) {
  fetch(`/api/person/${username}`).then(r => r.json()).then(data => {
    if (data.active && data.person) {
      const p = VALID_PEOPLE.find(pp => pp.image === data.person.image);
      if (p) { currentPerson = p; showCurrentPerson(p, data.person.hintIndex, data.person.totalHints); setActive(true); }
    }
    if (data.winners && data.winners.length) renderWinners(data.winners);
    if (data.allPlayers && data.allPlayers.length) renderAllPlayers(data.allPlayers);
    if (typeof data.scale === 'number') {
      overlayScale = data.scale;
      document.getElementById('scale-val').textContent = Math.round(overlayScale * 100) + '%';
    }
  });
}
</script>
