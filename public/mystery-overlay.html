<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>Mystery Box Overlay</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
<script src="/socket.io/socket.io.js"></script>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { background:transparent; width:100vw; height:100vh; font-family:'Tajawal',sans-serif; overflow:hidden; display:flex; align-items:center; justify-content:center; }

  .box {
    background:rgba(0,0,0,0.92);
    border:2px solid rgba(255,215,0,0.5);
    border-radius:22px;
    padding:22px 28px;
    min-width:520px; max-width:780px;
    opacity:0; pointer-events:none;
    transition:opacity 0.3s;
    position:relative; overflow:hidden;
  }
  .box.show { opacity:1; }

  .header { text-align:center; margin-bottom:14px; }
  .header .title { font-size:14px; color:#aaa; }
  .header .title span { color:#ffd700; font-weight:900; }

  /* Boxes preview at top */
  .boxes-preview {
    display:flex; justify-content:center; gap:8px; flex-wrap:wrap;
    margin-bottom:16px;
  }
  .mini-box {
    width:36px; height:36px; border-radius:8px;
    background:linear-gradient(135deg,#3a2510,#1a1a24);
    border:2px solid #ffd700;
    display:flex; align-items:center; justify-content:center;
    font-size:14px; transition:all 0.3s;
  }
  .mini-box.opened { background:rgba(29,186,114,0.15); border-color:#1dba72; opacity:0.4; }
  .mini-box.current {
    transform:scale(1.2);
    box-shadow:0 0 20px rgba(255,215,0,0.6);
    animation:bounce 1s infinite;
  }
  @keyframes bounce { 0%,100%{transform:scale(1.2);} 50%{transform:scale(1.3);} }

  /* Big box opening animation */
  .big-box-wrap {
    display:flex; justify-content:center; align-items:center;
    margin:14px 0; min-height:120px;
  }
  .big-box {
    font-size:80px; transition:transform 0.5s;
    animation:shake 0.5s ease-in-out;
  }
  @keyframes shake {
    0%,100% { transform:rotate(0deg); }
    25% { transform:rotate(-15deg) scale(1.1); }
    75% { transform:rotate(15deg) scale(1.1); }
  }

  .challenge {
    text-align:center; font-size:24px; font-weight:900;
    color:#ffd700; margin-bottom:12px;
    line-height:1.4; padding:0 10px;
  }
  .challenge-label {
    text-align:center; font-size:13px; color:#aaa; margin-bottom:6px;
  }

  .timer {
    text-align:center; font-size:48px; font-weight:900;
    color:#25f4ee; margin-bottom:14px;
    font-variant-numeric:tabular-nums;
    text-shadow:0 0 20px rgba(37,244,238,0.4);
  }
  .timer.warning { color:#f59e0b; }
  .timer.danger { color:#ff0050; animation:pulse 0.5s infinite; }
  @keyframes pulse { 0%,100%{transform:scale(1);} 50%{transform:scale(1.1);} }

  .stats {
    text-align:center; font-size:13px; color:#aaa;
    margin-bottom:14px;
  }
  .stats strong { color:#fff; font-size:16px; font-weight:900; }

  /* Winners cards */
  .winners-row {
    display:flex; justify-content:center; gap:10px; flex-wrap:wrap;
    margin-bottom:10px;
  }
  .win-card {
    display:flex; flex-direction:column; align-items:center; gap:4px;
    padding:8px; border-radius:12px;
    background:rgba(255,255,255,0.05);
    min-width:90px;
    animation:popIn 0.4s cubic-bezier(0.34,1.56,0.64,1) backwards;
  }
  .win-card.rank-1 { background:linear-gradient(180deg,rgba(255,215,0,0.25),rgba(255,215,0,0.05)); border:2px solid rgba(255,215,0,0.4); }
  .win-card.rank-2 { background:linear-gradient(180deg,rgba(192,192,192,0.2),rgba(192,192,192,0.05)); border:2px solid rgba(192,192,192,0.3); }
  .win-card.rank-3 { background:linear-gradient(180deg,rgba(205,127,50,0.2),rgba(205,127,50,0.05)); border:2px solid rgba(205,127,50,0.3); }
  @keyframes popIn { from{opacity:0;transform:scale(0.7);} to{opacity:1;transform:scale(1);} }
  .win-rank { font-size:22px; }
  .win-av {
    width:40px; height:40px; border-radius:50%; overflow:hidden;
    background:rgba(255,255,255,0.1); display:flex; align-items:center; justify-content:center;
    font-size:14px; font-weight:700;
  }
  .win-av img { width:100%; height:100%; object-fit:cover; }
  .win-name { font-size:11px; font-weight:700; color:#f0f0f5; max-width:90px; text-align:center; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .win-answer { font-size:10px; color:#1dba72; max-width:90px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }

  /* Recent answers feed */
  .answers-feed {
    display:flex; flex-direction:column; gap:3px;
    max-height:140px; overflow:hidden;
  }
  .ans-item {
    display:flex; align-items:center; gap:6px;
    padding:4px 8px; border-radius:6px;
    background:rgba(255,255,255,0.03);
    font-size:11px; animation:slideIn 0.3s;
  }
  @keyframes slideIn { from{opacity:0;transform:translateY(-3px);} to{opacity:1;transform:translateY(0);} }
  .ans-item.correct {
    background:rgba(29,186,114,0.15);
    border:1px solid rgba(29,186,114,0.4);
  }
  .ans-av-mini {
    width:18px; height:18px; border-radius:50%; overflow:hidden;
    background:rgba(255,255,255,0.1);
    display:flex; align-items:center; justify-content:center;
    font-size:9px; font-weight:700;
  }
  .ans-av-mini img { width:100%; height:100%; object-fit:cover; }
  .ans-name-mini { font-weight:700; color:#f0f0f5; max-width:90px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .ans-text-mini { flex:1; color:#bbb; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }

  /* Time up reveal */
  #reveal-screen { display:none; text-align:center; padding:14px 0; }
  #reveal-screen.show { display:block; }
  .reveal-title { font-size:20px; color:#ffd700; font-weight:900; margin-bottom:10px; }
  .reveal-answers { display:flex; justify-content:center; flex-wrap:wrap; gap:6px; margin-bottom:14px; }
  .reveal-chip {
    padding:5px 12px; background:rgba(29,186,114,0.2);
    border:1px solid rgba(29,186,114,0.5);
    border-radius:16px; color:#1dba72; font-weight:700; font-size:13px;
  }

  /* Confetti */
  .confetti-layer { position:absolute; inset:0; pointer-events:none; overflow:hidden; }
  .confetti { position:absolute; width:8px; height:12px; opacity:0; animation:confettiDrop 1.5s ease-out forwards; }
  @keyframes confettiDrop {
    0% { transform:translate(0,0) rotate(0deg); opacity:1; }
    100% { transform:translate(var(--x), var(--y)) rotate(var(--r)); opacity:0; }
  }
</style>
</head>
<body>

<div class="box" id="box">
  <!-- Game mode -->
  <div id="game-screen">
    <div class="header">
      <div class="title">📦 صناديق <span>الحظ</span></div>
    </div>

    <div class="boxes-preview" id="boxes-preview"></div>

    <div class="big-box-wrap">
      <div class="big-box" id="big-box">📦</div>
    </div>

    <div class="challenge-label">🎯 التحدي:</div>
    <div class="challenge" id="challenge">—</div>

    <div class="timer" id="timer">00:00</div>

    <div class="stats">
      🏆 الفائزون: <strong id="win-count">0</strong>/<strong id="max-count">3</strong>
    </div>

    <div class="winners-row" id="winners-row"></div>
    <div class="answers-feed" id="answers-feed"></div>
  </div>

  <!-- Reveal mode -->
  <div id="reveal-screen">
    <div class="reveal-title">⏰ انتهى الوقت!</div>
    <div class="challenge-label">التحدي كان:</div>
    <div class="challenge" id="reveal-challenge">—</div>
    <div class="reveal-title" style="margin-top:16px">✅ الإجابات الصحيحة</div>
    <div class="reveal-answers" id="reveal-answers"></div>
    <div class="reveal-title" style="margin-top:14px">🏆 الفائزون</div>
    <div class="winners-row" id="reveal-winners"></div>
  </div>

  <div class="confetti-layer" id="confetti-layer"></div>
</div>

<script>
const params = new URLSearchParams(location.search);
const username = params.get('username') || '';
const socket = io({ reconnection: true, reconnectionDelay: 500 });
let endTime = 0;
let timerInt = null;
let hideTimer = null;
let maxWinners = 3;

function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function joinRoom() {
  if (!username) return;
  socket.emit('join', { username });
  fetch(`/api/mystery/${username}`).then(r => r.json()).then(d => {
    maxWinners = d.maxWinners || 3;
    document.getElementById('max-count').textContent = maxWinners;
    if (d.boxes) renderMiniBoxes(d.boxes, d.currentBox?.id);
    if (d.active && d.currentBox) {
      showGame(d.currentBox.challenge, d.endTime, d.currentBox.id, d.boxes);
      renderWinners(d.currentBox.winners || []);
    }
  });
}
socket.on('connect', joinRoom);
joinRoom();

socket.on('mystery:setup', ({ boxes }) => {
  renderMiniBoxes(boxes || [], null);
});

socket.on('mystery:opened', ({ boxId, challenge, endTime: et, boxes, maxWinners: mw }) => {
  if (hideTimer) { clearTimeout(hideTimer); hideTimer = null; }
  if (mw) { maxWinners = mw; document.getElementById('max-count').textContent = mw; }
  document.getElementById('reveal-screen').classList.remove('show');
  document.getElementById('game-screen').style.display = 'block';
  document.getElementById('win-count').textContent = '0';
  showGame(challenge, et, boxId, boxes);
  renderWinners([]);
  renderAnswers([]);
  // open animation
  const bb = document.getElementById('big-box');
  bb.textContent = '📦';
  setTimeout(() => { bb.textContent = '🎁'; fireConfetti(); }, 600);
});

socket.on('mystery:answer', ({ recentAnswers }) => {
  renderAnswers(recentAnswers || []);
});

socket.on('mystery:won', ({ winner, winners }) => {
  document.getElementById('win-count').textContent = winners.length;
  renderWinners(winners || []);
  fireConfetti();
});

socket.on('mystery:timeUp', ({ challenge, answers, winners }) => {
  if (timerInt) { clearInterval(timerInt); timerInt = null; }
  showReveal(challenge, answers || [], winners || []);
  hideTimer = setTimeout(() => {
    document.getElementById('reveal-screen').classList.remove('show');
    document.getElementById('game-screen').style.display = 'block';
    // اختفِ بعد 8 ثواني إذا ما فتح صندوق آخر
  }, 30000);
});

function renderMiniBoxes(boxes, currentId) {
  const el = document.getElementById('boxes-preview');
  if (!boxes.length) { el.innerHTML = ''; return; }
  el.innerHTML = boxes.map(b => `
    <div class="mini-box ${b.opened ? 'opened' : ''} ${b.id === currentId ? 'current' : ''}">
      ${b.opened ? '✓' : '🎁'}
    </div>
  `).join('');
  document.getElementById('box').classList.add('show');
}

function showGame(challenge, et, currentId, allBoxes) {
  document.getElementById('box').classList.add('show');
  document.getElementById('game-screen').style.display = 'block';
  document.getElementById('reveal-screen').classList.remove('show');
  document.getElementById('challenge').textContent = challenge;
  if (allBoxes) renderMiniBoxes(allBoxes, currentId);
  endTime = et;
  updateTimer();
  if (timerInt) clearInterval(timerInt);
  timerInt = setInterval(updateTimer, 200);
}

function updateTimer() {
  const rem = Math.max(0, endTime - Date.now());
  const sec = Math.ceil(rem / 1000);
  const m = Math.floor(sec / 60);
  const s = sec % 60;
  const el = document.getElementById('timer');
  el.textContent = `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  el.classList.remove('warning','danger');
  if (sec <= 5 && sec > 0) el.classList.add('danger');
  else if (sec <= 10) el.classList.add('warning');
  if (rem <= 0) { clearInterval(timerInt); timerInt = null; }
}

function renderAnswers(list) {
  const el = document.getElementById('answers-feed');
  if (!list.length) { el.innerHTML = ''; return; }
  el.innerHTML = list.slice().reverse().slice(0, 5).map(a => `
    <div class="ans-item ${a.correct ? 'correct' : ''}">
      <div class="ans-av-mini">${a.avatar ? `<img src="${a.avatar}" onerror="this.parentElement.textContent='${esc(a.name[0])}'">` : esc(a.name[0])}</div>
      <span class="ans-name-mini">${esc(a.name)}</span>
      <span class="ans-text-mini">${esc(a.answer)}</span>
      ${a.correct ? '<span style="color:#1dba72;font-weight:900">✓</span>' : ''}
    </div>
  `).join('');
}

function renderWinners(list) {
  const el = document.getElementById('winners-row');
  if (!list.length) { el.innerHTML = ''; return; }
  const rankIcons = ['🥇','🥈','🥉','🏅','🏅','🏅','🏅','🏅','🏅','🏅'];
  const rankClasses = ['rank-1','rank-2','rank-3','','','','','','',''];
  el.innerHTML = list.slice(0, 5).map((w, i) => {
    const av = w.avatar ? `<img src="${w.avatar}" onerror="this.parentElement.textContent='${esc(w.name[0])}'">` : esc(w.name[0]);
    return `<div class="win-card ${rankClasses[i]}">
      <span class="win-rank">${rankIcons[i]}</span>
      <div class="win-av">${av}</div>
      <span class="win-name">${esc(w.name)}</span>
      <span class="win-answer">${esc(w.answer)}</span>
    </div>`;
  }).join('');
}

function showReveal(challenge, answers, winners) {
  document.getElementById('game-screen').style.display = 'none';
  document.getElementById('reveal-screen').classList.add('show');
  document.getElementById('reveal-challenge').textContent = challenge;

  document.getElementById('reveal-answers').innerHTML = answers.map(a => `<span class="reveal-chip">${esc(a)}</span>`).join('');

  const rankIcons = ['🥇','🥈','🥉','🏅','🏅'];
  const rankClasses = ['rank-1','rank-2','rank-3','',''];
  const winEl = document.getElementById('reveal-winners');
  if (!winners.length) {
    winEl.innerHTML = '<div style="color:#aaa;padding:14px">لا يوجد فائزون 😢</div>';
  } else {
    winEl.innerHTML = winners.slice(0, 5).map((w, i) => {
      const av = w.avatar ? `<img src="${w.avatar}" onerror="this.parentElement.textContent='${esc(w.name[0])}'">` : esc(w.name[0]);
      return `<div class="win-card ${rankClasses[i]}">
        <span class="win-rank">${rankIcons[i]}</span>
        <div class="win-av">${av}</div>
        <span class="win-name">${esc(w.name)}</span>
        <span class="win-answer">${esc(w.answer)}</span>
      </div>`;
    }).join('');
  }
}

function fireConfetti() {
  const layer = document.getElementById('confetti-layer');
  const box = document.getElementById('box');
  const colors = ['#ffd700','#ff0050','#25f4ee','#1dba72','#a78bfa','#f59e0b'];
  const cx = box.offsetWidth / 2;
  const cy = box.offsetHeight / 2;
  for (let i = 0; i < 25; i++) {
    const p = document.createElement('div');
    p.className = 'confetti';
    p.style.background = colors[i % colors.length];
    p.style.left = cx + 'px';
    p.style.top = cy + 'px';
    const angle = Math.random() * Math.PI * 2;
    const dist = 100 + Math.random() * 180;
    p.style.setProperty('--x', Math.cos(angle) * dist + 'px');
    p.style.setProperty('--y', Math.sin(angle) * dist + 'px');
    p.style.setProperty('--r', (Math.random() * 720) + 'deg');
    p.style.animationDelay = (Math.random() * 0.15) + 's';
    layer.appendChild(p);
    setTimeout(() => p.remove(), 1700);
  }
}
</script>
</body>
</html>
