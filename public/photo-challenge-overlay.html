<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>Photo Challenge Overlay</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
<script src="/socket.io/socket.io.js"></script>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { background:transparent; width:100vw; height:100vh; font-family:'Tajawal',sans-serif; overflow:hidden; display:flex; align-items:center; justify-content:center; }

  :root { --scale: 1; }

  .main-box {
    position:relative;
    background:rgba(0,0,0,.9);
    border:2px solid rgba(255,215,0,.5);
    border-radius:22px;
    padding:calc(22px * var(--scale)) calc(28px * var(--scale));
    min-width:calc(520px * var(--scale));
    max-width:calc(780px * var(--scale));
    opacity:0; pointer-events:none;
    transition:opacity .15s;
    overflow:hidden;
  }
  .main-box.show { opacity:1; }

  .game-title {
    font-size:calc(16px * var(--scale)); color:rgba(255,255,255,.5);
    text-align:center; margin-bottom:calc(16px * var(--scale));
  }
  .game-title span { color:#ffd700; font-weight:900; }

  /* Image display */
  .emojis-display {
    text-align:center;
    margin-bottom:calc(16px * var(--scale));
    animation:emojiPop .5s cubic-bezier(0.34,1.56,0.64,1);
  }
  .emojis-display img {
    max-width:calc(460px * var(--scale));
    max-height:calc(260px * var(--scale));
    border-radius:12px;
    object-fit:contain;
  }
  .emojis-display span {
    font-size:calc(80px * var(--scale)); line-height:1;
    letter-spacing:0.05em;
  }
  @keyframes emojiPop {
    0% { transform:scale(.5); opacity:0; }
    60% { transform:scale(1.1); }
    100% { transform:scale(1); opacity:1; }
  }

  .hint-text {
    font-size:calc(20px * var(--scale)); color:#fff;
    text-align:center; margin-bottom:calc(14px * var(--scale));
    font-weight:700;
  }
  .hint-text span { color:#ffd700; }

  /* Timer */
  .timer-row {
    display:flex; justify-content:center; align-items:center; gap:calc(10px * var(--scale));
    margin-bottom:calc(16px * var(--scale));
  }
  .timer-circle { width:calc(60px * var(--scale)); height:calc(60px * var(--scale)); position:relative; }
  .timer-circle svg { width:100%; height:100%; transform:rotate(-90deg); }
  .timer-bg { fill:none; stroke:rgba(255,255,255,.12); stroke-width:6; }
  .timer-fg {
    fill:none; stroke:#25f4ee; stroke-width:6;
    stroke-linecap:round;
    transition:stroke-dashoffset 0.95s linear, stroke 0.3s;
  }
  .timer-fg.warn { stroke:#f59e0b; }
  .timer-fg.danger { stroke:#ff0050; }
  .timer-text {
    position:absolute; inset:0;
    display:flex; align-items:center; justify-content:center;
    font-size:calc(20px * var(--scale)); font-weight:900; color:#fff;
  }
  .timer-text.danger { color:#ff0050; }

  /* Reveal answer */
  .reveal-badge {
    text-align:center; font-size:calc(28px * var(--scale)); font-weight:900;
    color:#1dba72; margin-bottom:calc(12px * var(--scale));
    background:rgba(29,186,114,.12);
    border:2px solid rgba(29,186,114,.45);
    border-radius:14px;
    padding:calc(10px * var(--scale)) calc(20px * var(--scale));
    display:none;
    animation:revealPop .5s cubic-bezier(0.34,1.56,0.64,1);
  }
  .reveal-badge.show { display:block; }
  @keyframes revealPop {
    0% { transform:scale(.5); opacity:0; }
    60% { transform:scale(1.1); }
    100% { transform:scale(1); opacity:1; }
  }

  .divider { height:1px; background:rgba(255,215,0,.15); margin:0 0 calc(16px * var(--scale)); }

  .lb-title { font-size:calc(13px * var(--scale)); font-weight:900; color:#ffd700; text-align:center; margin-bottom:calc(12px * var(--scale)); }

  .lb-items { display:flex; justify-content:center; align-items:center; gap:calc(8px * var(--scale)); flex-wrap:wrap; }
  .lb-item {
    display:flex; flex-direction:column; align-items:center; gap:calc(5px * var(--scale));
    padding:calc(8px * var(--scale)) calc(10px * var(--scale)) calc(10px * var(--scale));
    border-radius:12px; background:rgba(255,255,255,.04);
    width:calc(98px * var(--scale));
  }
  .lb-item.empty  { opacity:.25; }
  .lb-item.rank-1 { background:rgba(255,215,0,.15); border:1px solid rgba(255,215,0,.35); }
  .lb-item.rank-2 { background:rgba(192,192,192,.1); border:1px solid rgba(192,192,192,.25); }
  .lb-item.rank-3 { background:rgba(205,127,50,.1); border:1px solid rgba(205,127,50,.25); }

  .lb-rank { font-size:calc(18px * var(--scale)); }
  .lb-av {
    width:calc(44px * var(--scale)); height:calc(44px * var(--scale));
    border-radius:50%; overflow:hidden;
    background:rgba(255,255,255,.08); border:2px solid rgba(255,255,255,.15);
    display:flex; align-items:center; justify-content:center;
    font-size:calc(17px * var(--scale)); font-weight:700; color:#aaa;
  }
  .lb-av img { width:100%; height:100%; object-fit:cover; }
  .lb-name {
    font-size:calc(12px * var(--scale)); font-weight:700; color:#f0f0f5;
    max-width:calc(90px * var(--scale));
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis; text-align:center;
  }
  .lb-count { font-size:calc(11px * var(--scale)); color:#25f4ee; font-weight:700; background:rgba(37,244,238,.12); padding:2px 8px; border-radius:20px; }
  .lb-empty-name { font-size:calc(11px * var(--scale)); color:rgba(255,255,255,.2); }

  .confetti-layer { position:absolute; inset:0; pointer-events:none; overflow:hidden; }
</style>
</head>
<body>

<div class="main-box" id="box">
  <div class="game-title">📸 <span>تحدي الصور</span></div>

  <div class="emojis-display" id="emojis">❓</div>

  <div class="hint-text" id="hint" style="display:none">💡 <span id="hint-text"></span></div>

  <div class="timer-row" id="timer-row" style="display:none">
    <div class="timer-circle">
      <svg viewBox="0 0 100 100">
        <circle class="timer-bg" cx="50" cy="50" r="42"></circle>
        <circle class="timer-fg" id="timer-fg" cx="50" cy="50" r="42"
                stroke-dasharray="263.89" stroke-dashoffset="0"></circle>
      </svg>
      <div class="timer-text" id="timer-text">20</div>
    </div>
  </div>

  <div class="reveal-badge" id="reveal-badge">✅ <span id="reveal-name"></span></div>

  <div class="divider"></div>
  <div class="lb-title">🏆 أول من يخمّن</div>
  <div class="lb-items" id="lb-items"></div>

  <div class="confetti-layer" id="confetti-layer"></div>
</div>

<script>
const params = new URLSearchParams(location.search);
const cfg = { username: params.get('username') || '' };
const socket = io({ transports:['websocket','polling'], reconnection:true });

let timerInt = null;
let endTime = 0;
let totalDuration = 20;
const CIRCLE = 263.89;

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function joinRoom() {
  if (!cfg.username) return;
  socket.emit('join', { username: cfg.username });
  fetch(`/api/photo-challenge/${cfg.username}`).then(r => r.json()).then(d => {
    renderLeaderboard(d.allWinners || []);
    if (d.active) {
      const remainingMs = Math.max(0, d.endTime - Date.now());
      showQuestion(d.emojis, d.image, d.hint, Math.ceil(remainingMs/1000), d.duration);
    } else if (d.revealed && d.answer) {
      showAnswer(d.answer);
    }
  });
}
socket.on('connect', joinRoom);
joinRoom();

socket.on('photo-challenge:question', ({ emojis, image, hint, duration }) => {
  hideAnswer();
  showQuestion(emojis, image, hint, duration, duration);
  document.getElementById('box').classList.add('show');
});

socket.on('photo-challenge:reveal', ({ answer }) => {
  showAnswer(answer);
  stopTimer();
});

socket.on('photo-challenge:hint', ({ hint }) => {
  if (hint) {
    document.getElementById('hint-text').textContent = hint;
    document.getElementById('hint').style.display = 'block';
    document.getElementById('hint').style.animation = 'none';
    document.getElementById('hint').offsetHeight;
    document.getElementById('hint').style.animation = 'revealPop .4s cubic-bezier(0.34,1.56,0.64,1)';
  }
});

socket.on('photo-challenge:winner', (winner) => {
  fireConfetti();
  // refresh leaderboard
  fetch(`/api/photo-challenge/${cfg.username}`).then(r => r.json()).then(d => {
    renderLeaderboard(d.allWinners || []);
  });
});

socket.on('photo-challenge:stopped', () => {
  hideAnswer();
  stopTimer();
  document.getElementById('emojis').innerHTML = '<span>❓</span>';
  document.getElementById('hint').style.display = 'none';
  document.getElementById('timer-row').style.display = 'none';
  document.getElementById('box').classList.remove('show');
});

function showQuestion(emojis, image, hint, remaining, duration) {
  const el = document.getElementById('emojis');
  if (image) {
    el.innerHTML = `<img src="${image}" alt="لغز">`;
  } else {
    el.innerHTML = `<span>${emojis || '❓'}</span>`;
  }
  const hintEl = document.getElementById('hint');
  if (hint) {
    document.getElementById('hint-text').textContent = hint;
    hintEl.style.display = 'block';
  } else {
    hintEl.style.display = 'none';
  }
  totalDuration = duration || 20;
  startTimer(remaining);
  document.getElementById('reveal-badge').classList.remove('show');
}

function showAnswer(answer) {
  document.getElementById('reveal-name').textContent = answer;
  document.getElementById('reveal-badge').classList.add('show');
}

function hideAnswer() {
  document.getElementById('reveal-badge').classList.remove('show');
}

function startTimer(remaining) {
  endTime = Date.now() + remaining * 1000;
  document.getElementById('timer-row').style.display = 'flex';
  if (timerInt) clearInterval(timerInt);
  updateTimer();
  timerInt = setInterval(updateTimer, 200);
}

function stopTimer() { if (timerInt) clearInterval(timerInt); timerInt = null; }

function updateTimer() {
  const remMs = Math.max(0, endTime - Date.now());
  const sec = Math.ceil(remMs / 1000);
  const fg = document.getElementById('timer-fg');
  const text = document.getElementById('timer-text');
  text.textContent = sec;
  const ratio = Math.max(0, Math.min(1, remMs / (totalDuration*1000)));
  fg.style.strokeDashoffset = String(CIRCLE * (1 - ratio));
  fg.classList.remove('warn','danger');
  text.classList.remove('danger');
  if (sec <= 3 && sec > 0) { fg.classList.add('danger'); text.classList.add('danger'); }
  else if (sec <= 7 && sec > 0) { fg.classList.add('warn'); }
  if (remMs <= 0) { clearInterval(timerInt); timerInt = null; }
}

function renderLeaderboard(list) {
  const el = document.getElementById('lb-items');
  const top5 = (list || []).slice(0, 5);
  const slots = [];
  for (let i = 0; i < 5; i++) {
    const w = top5[i];
    const rank = i + 1;
    if (w) {
      const av = w.avatar
        ? `<img src="${w.avatar}" onerror="this.parentElement.textContent='${esc((w.name||'؟')[0])}'">`
        : esc((w.name||'؟')[0]);
      slots.push(`<div class="lb-item rank-${rank}">
        <span class="lb-rank">${['🥇','🥈','🥉','4️⃣','5️⃣'][i]}</span>
        <div class="lb-av">${av}</div>
        <span class="lb-name">${esc(w.name)}</span>
        <span class="lb-count">${w.totalWins} 🏆</span>
      </div>`);
    } else {
      slots.push(`<div class="lb-item empty">
        <span class="lb-rank">${['🥇','🥈','🥉','4️⃣','5️⃣'][i]}</span>
        <div class="lb-av">?</div>
        <span class="lb-empty-name">—</span>
      </div>`);
    }
  }
  el.innerHTML = slots.join('');
}

function fireConfetti() {
  const layer = document.getElementById('confetti-layer');
  const box = document.getElementById('box');
  const colors = ['#ffd700','#ff0050','#25f4ee','#1dba72','#a855f7','#ec4899'];
  const cx = box.offsetWidth / 2;
  const cy = box.offsetHeight / 2;
  for (let i = 0; i < 30; i++) {
    const p = document.createElement('div');
    p.style.cssText = `position:absolute;width:8px;height:12px;left:${cx}px;top:${cy}px;background:${colors[i%colors.length]};border-radius:2px;`;
    layer.appendChild(p);
    const angle = Math.random() * Math.PI * 2;
    const dist = 100 + Math.random() * 200;
    p.animate([
      { transform:'translate(0,0) rotate(0deg)', opacity:1 },
      { transform:`translate(${Math.cos(angle)*dist}px, ${Math.sin(angle)*dist}px) rotate(${720+Math.random()*720}deg)`, opacity:0 }
    ], { duration: 1500 + Math.random()*500, easing:'cubic-bezier(0.4,0,0.6,1)' });
    setTimeout(() => p.remove(), 2100);
  }
}
</script>
</body>
</html>
