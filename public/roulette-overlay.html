<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>Roulette Overlay</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
<script src="/socket.io/socket.io.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{background:transparent;width:100vw;height:100vh;font-family:'Tajawal',sans-serif;overflow:hidden;display:flex;align-items:center;justify-content:center}
.main{position:relative;background:rgba(10,0,0,.94);border:2px solid rgba(239,68,68,.4);border-radius:22px;padding:24px 28px;width:520px;opacity:0;transition:opacity .15s;overflow:hidden}
.main.show{opacity:1}
.main::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,#ef4444,#dc2626,#ef4444)}

.title{font-size:16px;color:rgba(255,255,255,.4);text-align:center;margin-bottom:8px}.title span{color:#ef4444;font-weight:900}
.phase{text-align:center;font-size:14px;color:#fbbf24;font-weight:700;margin-bottom:14px}

.gun{text-align:center;font-size:64px;margin-bottom:14px;transition:transform .3s}
.gun.spin{animation:gunSpin .6s cubic-bezier(0.4,0,0.2,1)}
@keyframes gunSpin{0%{transform:rotate(0)}25%{transform:rotate(-30deg)}50%{transform:rotate(15deg)}75%{transform:rotate(-10deg)}100%{transform:rotate(0)}}

.players-circle{display:flex;flex-wrap:wrap;justify-content:center;gap:8px;margin-bottom:14px}
.player-slot{width:56px;text-align:center;transition:all .3s}
.player-avatar{width:44px;height:44px;border-radius:50%;border:3px solid #22c55e;overflow:hidden;margin:0 auto 4px;position:relative;transition:all .3s}
.player-avatar img{width:100%;height:100%;object-fit:cover}
.player-avatar.dead{border-color:#ef4444;filter:grayscale(1);opacity:.3}
.player-avatar.dead::after{content:'💀';position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.6);font-size:20px}
.player-avatar.victim{animation:victimShake .5s ease;border-color:#ef4444}
@keyframes victimShake{0%,100%{transform:translateX(0)}20%{transform:translateX(-8px)}40%{transform:translateX(8px)}60%{transform:translateX(-4px)}80%{transform:translateX(4px)}}
.player-name{font-size:9px;color:rgba(255,255,255,.5);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

.victim-banner{display:none;text-align:center;padding:14px;margin-bottom:10px;background:rgba(239,68,68,.1);border:1.5px solid rgba(239,68,68,.3);border-radius:12px;animation:fadeIn .4s ease}
.victim-banner.show{display:block}
.victim-text{font-size:18px;font-weight:900;color:#ef4444}
.victim-sub{font-size:12px;color:rgba(255,255,255,.3);margin-top:4px}
@keyframes fadeIn{from{opacity:0;transform:scale(.9)}to{opacity:1;transform:scale(1)}}

.stats{display:flex;justify-content:center;gap:20px;margin-bottom:10px;font-size:12px;color:rgba(255,255,255,.3)}
.stats span{font-weight:700;color:#fff}

.reg-banner{text-align:center;padding:14px;display:none}
.reg-title{font-size:15px;color:#fbbf24;font-weight:900;margin-bottom:4px}
.reg-keyword{font-size:20px;font-weight:900;color:#fff}
.reg-count{font-size:13px;color:rgba(255,255,255,.4);margin-top:4px}

.winner-box{position:absolute;inset:0;background:rgba(10,0,0,.9);backdrop-filter:blur(12px);display:none;flex-direction:column;align-items:center;justify-content:center;border-radius:22px;z-index:10}
.winner-box.show{display:flex;animation:fadeIn .5s ease}
.winner-icon{font-size:52px;margin-bottom:6px}
.winner-name{font-size:26px;font-weight:900;color:#22c55e}
.winner-sub{font-size:14px;color:rgba(255,255,255,.4);margin-top:4px}

.confetti{position:absolute;inset:0;pointer-events:none;overflow:hidden}
</style>
</head>
<body>
<div class="main" id="box">
  <div class="title">☠️ <span>الروليت الروسي</span></div>
  <div class="phase" id="phase"></div>
  <div class="gun" id="gun">🔫</div>
  <div class="reg-banner" id="reg-banner">
    <div class="reg-title">اكتب في الشات عشان تشارك</div>
    <div class="reg-keyword" id="reg-keyword">روليت</div>
    <div class="reg-count" id="reg-count">0 / 6</div>
  </div>
  <div class="players-circle" id="players-circle"></div>
  <div class="victim-banner" id="victim-banner">
    <div class="victim-text" id="victim-text"></div>
    <div class="victim-sub" id="victim-sub"></div>
  </div>
  <div class="stats" id="stats" style="display:none">الجولة <span id="round-num">0</span> — باقي <span id="alive-num">0</span></div>
  <div class="winner-box" id="winner-box">
    <div class="winner-icon">🏆</div>
    <div class="winner-name" id="winner-name"></div>
    <div class="winner-sub">الناجي الوحيد!</div>
  </div>
  <div class="confetti" id="confetti"></div>
</div>
<script>
var params=new URLSearchParams(location.search),username=params.get('username')||'';
var socket=io();if(username)socket.emit('join',{username});
var CC=['#ef4444','#22c55e','#3b82f6','#fbbf24','#a855f7','#ec4899'];
var allPlayers=[];

socket.on('roulette:register',function(d){
  document.getElementById('box').classList.add('show');
  document.getElementById('winner-box').classList.remove('show');
  document.getElementById('victim-banner').classList.remove('show');
  document.getElementById('reg-banner').style.display='block';
  document.getElementById('reg-keyword').textContent=d.keyword;
  document.getElementById('reg-count').textContent='0 / '+d.maxPlayers;
  document.getElementById('phase').textContent='📝 مرحلة التسجيل';
  document.getElementById('stats').style.display='none';
  document.getElementById('players-circle').innerHTML='';
  allPlayers=[];
});

socket.on('roulette:joined',function(d){
  document.getElementById('reg-count').textContent=d.count+' / '+d.max;
  allPlayers.push({name:d.player,avatar:d.avatar,alive:true});
  renderPlayers();
});

socket.on('roulette:locked',function(d){
  document.getElementById('reg-banner').style.display='none';
  document.getElementById('phase').textContent='🔒 جاهزين — '+d.count+' لاعب';
  document.getElementById('stats').style.display='flex';
  document.getElementById('alive-num').textContent=d.count;
});

socket.on('roulette:result',function(d){
  document.getElementById('gun').classList.add('spin');
  setTimeout(function(){document.getElementById('gun').classList.remove('spin');},700);
  document.getElementById('round-num').textContent=d.round;
  document.getElementById('alive-num').textContent=d.aliveCount;
  // Mark victim
  allPlayers.forEach(function(p){
    if(p.name===d.victim.name) p.alive=false;
  });
  setTimeout(function(){
    renderPlayers();
    document.getElementById('victim-text').textContent='💀 '+d.victim.name+' طلع!';
    document.getElementById('victim-sub').textContent='الجولة '+d.round+' — باقي '+d.aliveCount;
    document.getElementById('victim-banner').classList.add('show');
    document.getElementById('phase').textContent='☠️ '+d.victim.name+' طلع!';
    if(d.winner){
      setTimeout(function(){
        document.getElementById('winner-name').textContent=d.winner.name;
        document.getElementById('winner-box').classList.add('show');
        document.getElementById('phase').textContent='🏆 الناجي!';
        fireConfetti();
      },1500);
    }
  },600);
});

socket.on('roulette:stopped',function(){document.getElementById('box').classList.remove('show');});

function renderPlayers(){
  document.getElementById('players-circle').innerHTML=allPlayers.map(function(p){
    var cls=p.alive?'':'dead';
    var avHtml=p.avatar?'<img src="'+p.avatar+'" onerror="this.style.display=\'none\'">':'';
    return '<div class="player-slot"><div class="player-avatar '+cls+'">'+avHtml+'</div><div class="player-name">'+esc(p.name)+'</div></div>';
  }).join('');
}

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function fireConfetti(){var layer=document.getElementById('confetti'),box=document.getElementById('box'),cx=box.offsetWidth/2,cy=box.offsetHeight/2;for(var i=0;i<40;i++){var p=document.createElement('div');p.style.cssText='position:absolute;width:7px;height:11px;left:'+cx+'px;top:'+cy+'px;background:'+CC[i%CC.length]+';border-radius:2px;';layer.appendChild(p);var a=Math.random()*Math.PI*2,d=80+Math.random()*220;p.animate([{transform:'translate(0,0) rotate(0deg)',opacity:1},{transform:'translate('+Math.cos(a)*d+'px,'+Math.sin(a)*d+'px) rotate('+(600+Math.random()*600)+'deg)',opacity:0}],{duration:1400+Math.random()*500,easing:'cubic-bezier(0.4,0,0.6,1)'});setTimeout(function(el){el.remove()}.bind(null,p),2000);}}
</script>
</body>
</html>
