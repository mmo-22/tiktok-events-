<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>Countdown Overlay</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
<script src="/socket.io/socket.io.js"></script>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { background:transparent; width:100vw; height:100vh; font-family:'Tajawal',sans-serif; overflow:hidden; display:flex; align-items:center; justify-content:center; }

  .box {
    background:rgba(0,0,0,0.92);
    border:2px solid rgba(255,215,0,0.5);
    border-radius:22px;
    padding:22px 28px;
    min-width:520px; max-width:780px;
    opacity:0; pointer-events:none;
    transition:opacity 0.3s;
    position:relative;
  }
  .box.show { opacity:1; }

  .header { text-align:center; margin-bottom:16px; }
  .header .title { font-size:14px; color:#aaa; }
  .header .title span { color:#ffd700; font-weight:900; }

  .question {
    text-align:center; font-size:24px; font-weight:900;
    color:#fff; margin-bottom:16px; min-height:30px;
    line-height:1.3;
  }

  .timer {
    text-align:center; font-size:64px; font-weight:900;
    color:#25f4ee; margin-bottom:14px;
    font-variant-numeric:tabular-nums;
    text-shadow:0 0 30px rgba(37,244,238,0.4);
  }
  .timer.warning { color:#f59e0b; text-shadow:0 0 30px rgba(245,158,11,0.5); }
  .timer.danger {
    color:#ff0050; text-shadow:0 0 40px rgba(255,0,80,0.6);
    animation:pulse 0.5s infinite;
  }
  @keyframes pulse { 0%,100%{transform:scale(1);} 50%{transform:scale(1.08);} }

  .stats {
    display:flex; justify-content:space-around;
    padding:10px; background:rgba(255,255,255,0.04);
    border-radius:12px; margin-bottom:14px;
    font-size:14px; color:#aaa;
  }
  .stats strong { color:#fff; font-size:18px; font-weight:900; }

  .answers-label {
    font-size:12px; color:#ffd700; font-weight:700;
    text-align:center; margin-bottom:8px;
  }
  .answers-feed {
    display:flex; flex-direction:column; gap:4px;
    max-height:300px; overflow:hidden;
  }
  .ans-item {
    display:flex; align-items:center; gap:8px;
    padding:6px 10px; border-radius:8px;
    background:rgba(255,255,255,0.04);
    animation:slideIn 0.3s;
    font-size:13px;
  }
  @keyframes slideIn { from{opacity:0;transform:translateY(-5px);} to{opacity:1;transform:translateY(0);} }
  .ans-item.correct {
    background:rgba(29,186,114,0.15);
    border:1px solid rgba(29,186,114,0.4);
  }
  .ans-av {
    width:24px; height:24px; border-radius:50%; overflow:hidden;
    background:rgba(255,255,255,0.1);
    display:flex; align-items:center; justify-content:center;
    font-size:11px; font-weight:700;
  }
  .ans-av img { width:100%; height:100%; object-fit:cover; }
  .ans-name { font-weight:700; color:#f0f0f5; max-width:140px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .ans-text { flex:1; color:#ccc; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .ans-item.correct .ans-text { color:#1dba72; font-weight:700; }

  /* Reveal mode */
  #reveal-screen {
    display:none;
    text-align:center; padding:10px 0;
  }
  #reveal-screen.show { display:block; }
  .reveal-title {
    font-size:18px; color:#ffd700; font-weight:700;
    margin-bottom:12px;
  }
  .reveal-answers {
    display:flex; justify-content:center; flex-wrap:wrap; gap:8px;
    margin-bottom:20px;
  }
  .reveal-chip {
    padding:6px 14px; background:rgba(29,186,114,0.2);
    border:1px solid rgba(29,186,114,0.5);
    border-radius:20px; color:#1dba72; font-weight:700; font-size:14px;
  }

  .winners-title { font-size:15px; color:#ffd700; font-weight:900; margin-bottom:10px; }
  .winners-row {
    display:flex; justify-content:center; gap:14px;
    flex-wrap:wrap;
  }
  .win-card {
    display:flex; flex-direction:column; align-items:center; gap:6px;
    padding:12px 10px; border-radius:14px;
    background:rgba(255,255,255,0.05);
    min-width:110px;
    animation:popIn 0.5s cubic-bezier(0.34,1.56,0.64,1) backwards;
  }
  .win-card:nth-child(1) { background:linear-gradient(180deg,rgba(255,215,0,0.25),rgba(255,215,0,0.05)); border:2px solid rgba(255,215,0,0.4); animation-delay:0s; }
  .win-card:nth-child(2) { background:linear-gradient(180deg,rgba(192,192,192,0.2),rgba(192,192,192,0.05)); border:2px solid rgba(192,192,192,0.3); animation-delay:0.15s; }
  .win-card:nth-child(3) { background:linear-gradient(180deg,rgba(205,127,50,0.2),rgba(205,127,50,0.05)); border:2px solid rgba(205,127,50,0.3); animation-delay:0.3s; }
  @keyframes popIn { from{opacity:0;transform:scale(0.7);} to{opacity:1;transform:scale(1);} }
  .win-rank { font-size:28px; }
  .win-av {
    width:50px; height:50px; border-radius:50%; overflow:hidden;
    background:rgba(255,255,255,0.1); display:flex; align-items:center; justify-content:center;
    font-size:18px; font-weight:700;
  }
  .win-av img { width:100%; height:100%; object-fit:cover; }
  .win-name { font-size:12px; font-weight:700; color:#f0f0f5; max-width:100px; text-align:center; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .win-time { font-size:11px; color:#25f4ee; background:rgba(37,244,238,0.15); padding:2px 8px; border-radius:10px; }
  .win-answer { font-size:11px; color:#1dba72; }

  .more-winners {
    margin-top:10px; font-size:13px; color:#aaa;
  }
</style>
</head>
<body>

<div class="box" id="box">
  <!-- Game mode -->
  <div id="game-screen">
    <div class="header">
      <div class="title">⏰ العدّ <span>التنازلي</span></div>
    </div>
    <div class="question" id="question">—</div>
    <div class="timer" id="timer">00:00</div>
    <div class="stats">
      <div>💬 إجابات: <strong id="total-answers">0</strong></div>
      <div>✅ صحيحة: <strong id="total-correct">0</strong></div>
    </div>
    <div class="answers-label">💬 آخر الإجابات</div>
    <div class="answers-feed" id="answers-feed"></div>
  </div>

  <!-- Reveal mode -->
  <div id="reveal-screen">
    <div class="reveal-title">✅ الإجابات الصحيحة</div>
    <div class="reveal-answers" id="reveal-answers"></div>
    <div class="winners-title">🏆 أول 3 فائزين</div>
    <div class="winners-row" id="winners-row"></div>
    <div class="more-winners" id="more-winners"></div>
  </div>
</div>

<script>
const params = new URLSearchParams(location.search);
const username = params.get('username') || '';
const socket = io({ reconnection: true, reconnectionDelay: 500 });
let endTime = 0;
let timerInt = null;
let hideTimer = null;

function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function joinRoom() {
  if (!username) return;
  socket.emit('join', { username });
  fetch(`/api/countdown/${username}`).then(r => r.json()).then(d => {
    if (d.active) {
      showGame(d.question, d.endTime);
      document.getElementById('total-answers').textContent = (d.recentAnswers || []).length;
      document.getElementById('total-correct').textContent = (d.winners || []).length;
      renderAnswers(d.recentAnswers || []);
    }
  });
}
socket.on('connect', joinRoom);
joinRoom();

socket.on('countdown:started', ({ question, endTime: et, duration }) => {
  if (hideTimer) { clearTimeout(hideTimer); hideTimer = null; }
  document.getElementById('reveal-screen').classList.remove('show');
  document.getElementById('game-screen').style.display = 'block';
  document.getElementById('total-answers').textContent = 0;
  document.getElementById('total-correct').textContent = 0;
  renderAnswers([]);
  showGame(question, et);
});

socket.on('countdown:answer', ({ recentAnswers }) => {
  document.getElementById('total-answers').textContent = recentAnswers.length;
  renderAnswers(recentAnswers);
});

socket.on('countdown:won', ({ totalWinners }) => {
  document.getElementById('total-correct').textContent = totalWinners;
});

socket.on('countdown:ended', ({ question, answers, winners, totalWinners }) => {
  if (timerInt) { clearInterval(timerInt); timerInt = null; }
  showReveal(answers || [], winners || [], totalWinners || 0);
  hideTimer = setTimeout(() => {
    document.getElementById('box').classList.remove('show');
  }, 30000);
});

function showGame(question, et) {
  document.getElementById('box').classList.add('show');
  document.getElementById('game-screen').style.display = 'block';
  document.getElementById('reveal-screen').classList.remove('show');
  document.getElementById('question').textContent = question;
  endTime = et;
  updateTimer();
  if (timerInt) clearInterval(timerInt);
  timerInt = setInterval(updateTimer, 200);
}

function updateTimer() {
  const rem = Math.max(0, endTime - Date.now());
  const sec = Math.ceil(rem / 1000);
  const m = Math.floor(sec / 60);
  const s = sec % 60;
  const el = document.getElementById('timer');
  el.textContent = `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  el.classList.remove('warning','danger');
  if (sec <= 5 && sec > 0) el.classList.add('danger');
  else if (sec <= 10) el.classList.add('warning');
  if (rem <= 0) { clearInterval(timerInt); timerInt = null; }
}

function renderAnswers(list) {
  const el = document.getElementById('answers-feed');
  el.innerHTML = list.slice().reverse().map(a => {
    const av = a.avatar
      ? `<img src="${a.avatar}" onerror="this.parentElement.textContent='${esc(a.name[0])}'">`
      : esc(a.name[0]);
    return `<div class="ans-item ${a.correct ? 'correct' : ''}">
      <div class="ans-av">${av}</div>
      <span class="ans-name">${esc(a.name)}</span>
      <span class="ans-text">${esc(a.answer)}</span>
      ${a.correct ? '<span style="color:#1dba72;font-weight:900">✓</span>' : ''}
    </div>`;
  }).join('');
}

function showReveal(answers, winners, totalWinners) {
  document.getElementById('game-screen').style.display = 'none';
  document.getElementById('reveal-screen').classList.add('show');
  document.getElementById('box').classList.add('show');

  // عرض الإجابات الصحيحة
  const ansEl = document.getElementById('reveal-answers');
  ansEl.innerHTML = answers.map(a => `<span class="reveal-chip">${esc(a)}</span>`).join('');

  // عرض أول 3 فائزين
  const rankIcons = ['🥇','🥈','🥉'];
  const winEl = document.getElementById('winners-row');
  if (!winners.length) {
    winEl.innerHTML = '<div style="color:#aaa;padding:20px">لا يوجد فائزين 😢</div>';
  } else {
    winEl.innerHTML = winners.slice(0,3).map((w, i) => {
      const av = w.avatar
        ? `<img src="${w.avatar}" onerror="this.parentElement.textContent='${esc(w.name[0])}'">`
        : esc(w.name[0]);
      return `<div class="win-card">
        <span class="win-rank">${rankIcons[i]}</span>
        <div class="win-av">${av}</div>
        <span class="win-name">${esc(w.name)}</span>
        <span class="win-answer">${esc(w.answer)}</span>
        <span class="win-time">${(w.time/1000).toFixed(1)}s</span>
      </div>`;
    }).join('');
  }

  const more = document.getElementById('more-winners');
  if (totalWinners > 3) {
    more.textContent = `+ ${totalWinners - 3} فائز آخر`;
  } else {
    more.textContent = '';
  }
}
</script>
</body>
</html>
