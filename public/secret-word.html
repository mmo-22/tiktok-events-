<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>كلمة السر - تحكم</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
<script src="/socket.io/socket.io.js"></script>
<style>
  :root { --bg:#0d0d14; --surface:#181824; --surface2:#242436; --border:#2d2d40; --text:#f0f0f5; --muted:#9a9ab0; --accent:#ff0050; --accent2:#25f4ee; --purple:#a855f7; --orange:#fb923c; }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--bg); color:var(--text); font-family:'Tajawal',sans-serif; padding:20px; min-height:100vh; }
  .wrap { max-width:900px; margin:0 auto; display:flex; flex-direction:column; gap:14px; }
  .header { display:flex; justify-content:space-between; align-items:center; padding:14px 18px; background:var(--surface); border-radius:12px; }
  .header h1 { font-size:22px; }
  .badge { font-size:12px; padding:4px 12px; border-radius:20px; background:var(--surface2); color:var(--muted); }
  .badge.active { background:#1dba72; color:#fff; }
  .badge.auto { background:var(--purple); color:#fff; }
  .card { background:var(--surface); border-radius:14px; padding:16px; border:1px solid var(--border); }
  .card-title { font-size:15px; font-weight:700; margin-bottom:12px; color:var(--purple); }
  .row4 { display:grid; grid-template-columns:1fr 1fr 1fr 1fr; gap:10px; }
  .row3 { display:grid; grid-template-columns:1fr 1fr 1fr; gap:10px; }
  .field { margin-bottom:12px; }
  .field label { display:block; font-size:13px; color:var(--muted); margin-bottom:6px; }
  .field input, .field select, .field textarea { width:100%; padding:10px 12px; background:var(--surface2); border:1px solid var(--border); border-radius:8px; color:var(--text); font-family:inherit; font-size:14px; }
  .field textarea { resize:vertical; min-height:40px; }
  .actions { display:flex; gap:8px; flex-wrap:wrap; }
  .btn { padding:11px 16px; border:none; border-radius:10px; font-family:inherit; font-weight:700; cursor:pointer; font-size:14px; }
  .btn:disabled { opacity:.4; cursor:not-allowed; }
  .btn-auto { background:var(--purple); color:#fff; flex:1; }
  .btn-auto.on { background:#dc2626; }
  .btn-next { background:var(--accent2); color:#000; flex:1; }
  .btn-hint { background:var(--orange); color:#fff; flex:1; }
  .btn-reveal { background:#fbbf24; color:#000; flex:1; }
  .btn-stop { background:var(--accent); color:#fff; flex:1; }

  .preview { background:#111; border-radius:14px; padding:24px; text-align:center; min-height:120px; }
  .preview-letters { display:flex; justify-content:center; gap:8px; flex-wrap:wrap; direction:rtl; margin-bottom:16px; }
  .preview-box { width:44px; height:50px; border:2px solid rgba(168,85,247,.4); border-radius:8px; background:rgba(168,85,247,.08); display:flex; align-items:center; justify-content:center; font-size:22px; font-weight:900; color:#fff; }
  .preview-box.rev { background:rgba(168,85,247,.25); border-color:var(--purple); }
  .preview-answer { font-size:1.8rem; font-weight:900; color:#1dba72; margin-top:10px; }
  .preview-hint { font-size:1rem; color:var(--orange); margin-top:6px; }
  .preview-empty { color:#9ca3af; font-size:14px; padding:30px 0; }

  .timer-display { text-align:center; font-size:42px; font-weight:900; color:var(--purple); margin:8px 0; }
  .timer-display.warning { color:#f59e0b; }
  .timer-display.ended { color:var(--accent); }

  .word-list { max-height:350px; overflow-y:auto; display:grid; grid-template-columns:1fr 1fr 1fr; gap:6px; }
  .word-item { padding:8px 12px; background:var(--surface2); border-radius:8px; cursor:pointer; transition:all 0.15s; display:flex; justify-content:space-between; align-items:center; }
  .word-item:hover { background:var(--border); }
  .word-item.used { opacity:0.25; }
  .word-text { font-weight:700; color:var(--purple); font-size:14px; }
  .word-cat { font-size:11px; color:var(--muted); }

  .winner-item { display:flex; align-items:center; gap:10px; padding:10px 12px; border-radius:10px; background:var(--surface2); margin-bottom:6px; }
  .winner-rank { width:28px; height:28px; border-radius:50%; background:var(--purple); color:#fff; display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:900; }
  .winner-av { width:34px; height:34px; border-radius:50%; overflow:hidden; background:var(--surface); display:flex; align-items:center; justify-content:center; font-size:14px; font-weight:700; }
  .winner-av img { width:100%; height:100%; object-fit:cover; }
  .winner-name { flex:1; font-weight:700; }
  .winner-wins { color:var(--purple); font-weight:900; }
  .empty { text-align:center; padding:24px; color:var(--muted); font-size:13px; }
  .overlay-link { background:var(--surface2); padding:10px; border-radius:8px; font-family:monospace; font-size:12px; word-break:break-all; cursor:pointer; }

  .tabs { display:flex; gap:6px; margin-bottom:12px; }
  .tab { padding:8px 16px; background:var(--surface2); border:1px solid var(--border); border-radius:8px; cursor:pointer; font-size:13px; font-family:inherit; color:var(--muted); }
  .tab.active { background:var(--purple); color:#fff; border-color:var(--purple); }
</style>
</head>
<body>
<div class="wrap">
  <div class="header">
    <h1>🔐 كلمة السر</h1>
    <span class="badge" id="status-badge">متوقف</span>
  </div>

  <div class="card">
    <div class="card-title">⚙️ الإعدادات</div>
    <div class="row4">

      <div class="field"><label>كشف حرف كل (ثواني)</label><input type="number" id="reveal-interval" value="4" min="1" max="15"></div>
      <div class="field"><label>وقت الانتظار (ثواني)</label><input type="number" id="wait-time" value="5" min="2" max="20"></div>
      <div class="field"><label>الفئة</label>
        <select id="category-filter">
          <option value="all">الكل</option>
          <option value="حيوانات">🐾 حيوانات</option>
          <option value="دول">🌍 دول وعواصم</option>
          <option value="مدن">🏙️ مدن</option>
          <option value="فواكه">🍎 فواكه وخضار</option>
          <option value="رياضة">⚽ رياضة</option>
          <option value="طعام">🍽️ طعام</option>
          <option value="تكنولوجيا">💻 تكنولوجيا</option>
          <option value="سيارات">🚗 سيارات</option>
          <option value="مشاهير">⭐ مشاهير</option>
          <option value="أماكن">📍 أماكن</option>
          <option value="علوم">🔬 علوم</option>
          <option value="متنوع">🎯 متنوع</option>
        </select>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="tabs">
      <button class="tab active" onclick="switchTab('bank')">🗂️ من البنك</button>
      <button class="tab" onclick="switchTab('custom')">✏️ مخصص</button>
    </div>
    <div id="tab-bank">
      <div class="card-title">🗂️ بنك الكلمات (<span id="word-count">0</span>)</div>
      <div class="word-list" id="word-list"></div>
    </div>
    <div id="tab-custom" style="display:none">
      <div class="card-title">✏️ كلمة مخصصة</div>
      <div class="field"><label>الكلمة</label><input type="text" id="custom-word" placeholder="مثال: تمساح"></div>
      <div class="field"><label>إجابات بديلة (بفواصل)</label><textarea id="custom-aliases" placeholder="التمساح, crocodile"></textarea></div>
      <div class="field"><label>تلميح</label><input type="text" id="custom-hint" placeholder="حيوان زاحف"></div>
      <button class="btn btn-next" onclick="startCustom()" style="width:100%;margin-top:8px">▶ ابدأ</button>
    </div>
  </div>

  <div class="card">
    <div class="card-title">👁️ معاينة</div>
    <div class="preview" id="preview"><div class="preview-empty">اختر كلمة ليبدأ التحدي</div></div>
    <div class="timer-display" id="timer-display" style="display:none">00</div>
  </div>

  <div class="card">
    <div class="card-title">🎮 التحكم</div>
    <div class="actions" style="margin-bottom:8px">
      <button class="btn btn-auto" id="auto-btn" onclick="toggleAuto()">▶ تشغيل أوتوماتيك</button>
    </div>
    <div class="actions">
      <button class="btn btn-next" onclick="nextQuestion()">⏭ التالي</button>
      <button class="btn btn-hint" onclick="sendHint()">💡 تلميح</button>
      <button class="btn btn-reveal" onclick="revealAnswer()">🔓 اكشف</button>
      <button class="btn btn-stop" onclick="stopGame()">⏹ إيقاف</button>
    </div>
  </div>

  <div class="card">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
      <div class="card-title" style="margin-bottom:0">🏆 لوحة الفائزين</div>
      <button class="btn" style="font-size:12px;padding:4px 12px;background:var(--surface2);border:1px solid var(--border);color:var(--muted)" onclick="clearStats()">مسح</button>
    </div>
    <div id="winners-list"><div class="empty">لا يوجد فائزون بعد</div></div>
  </div>

  <div class="card">
    <div class="card-title">🔗 رابط الـ Overlay</div>
    <div style="display:flex;gap:8px;align-items:center">
      <div class="overlay-link" id="overlay-link" style="flex:1">—</div>
      <button class="btn" onclick="copyOverlay()" style="background:var(--accent2);color:#000;padding:10px 16px;font-size:13px">📋 نسخ</button>
    </div>
  </div>
</div>

const params = new URLSearchParams(location.search);
let username = params.get('username') || '';
const socket = io({ transports:['websocket','polling'], reconnection:true });
if (username) socket.emit('join', { username });

function updateOverlayLink() {
  document.getElementById('overlay-link').textContent = location.origin + '/secret-word-overlay.html?username=' + username;
}
updateOverlayLink();
function copyOverlay() {
  navigator.clipboard.writeText(document.getElementById('overlay-link').textContent);
  document.getElementById('overlay-link').style.borderColor = '#1dba72';
  setTimeout(() => { document.getElementById('overlay-link').style.borderColor = ''; }, 1000);
}

let currentWord = null, questionIndex = 0, usedIndices = new Set();
let autoMode = false, autoTimer = null, timerInt = null, endTime = 0;

document.getElementById('word-count').textContent = WORDS.length;

function shuffleArray(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b;}
let shuffled = shuffleArray(WORDS.map((w,i)=>i));
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function switchTab(t){
  document.getElementById('tab-bank').style.display = t==='bank'?'':'none';
  document.getElementById('tab-custom').style.display = t==='custom'?'':'none';
  document.querySelectorAll('.tab').forEach((el,i)=>el.classList.toggle('active',i===(t==='bank'?0:1)));
}

async function nextQuestion(){
  const cat = document.getElementById('category-filter').value;
  let pool = WORDS.map((w,i)=>({...w,idx:i}));
  if(cat!=='all') pool = pool.filter(w=>w.cat===cat);
  pool = pool.filter(w=>!usedIndices.has(w.idx));
  if(!pool.length){usedIndices.clear();pool=WORDS.map((w,i)=>({...w,idx:i}));if(cat!=='all')pool=pool.filter(w=>w.cat===cat);}
  const pick = pool[Math.floor(Math.random()*pool.length)];
  usedIndices.add(pick.idx);
  currentWord = pick;
  questionIndex++;
  const duration = parseInt(document.getElementById('duration').value)||30;
  const revealInterval = parseInt(document.getElementById('reveal-interval').value)||4;
  await fetch('/api/secret-word/start',{
    method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({username,word:pick.word,aliases:pick.aliases||[],hint:pick.hint||'',category:pick.cat||'',duration,revealInterval,questionIndex}),
  });
  renderPreview(pick,false);
  startTimer(duration);
  setActive(true);
  renderWordList();
}

async function startCustom(){
  const word=document.getElementById('custom-word').value.trim();
  const aliases=document.getElementById('custom-aliases').value.trim().split(/[,،]/).map(s=>s.trim()).filter(Boolean);
  const hint=document.getElementById('custom-hint').value.trim();
  if(!word){alert('أدخل الكلمة');return;}
  currentWord={word,aliases,hint,cat:'مخصص'};
  questionIndex++;
  const duration=parseInt(document.getElementById('duration').value)||30;
  const revealInterval=parseInt(document.getElementById('reveal-interval').value)||4;
  await fetch('/api/secret-word/start',{
    method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({username,word,aliases,hint,category:'مخصص',duration,revealInterval,questionIndex}),
  });
  renderPreview(currentWord,false);
  startTimer(duration);
  setActive(true);
}

async function sendHint(){
  if(!currentWord) return;
  await fetch('/api/secret-word/hint',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username})});
}

async function revealAnswer(){
  await fetch('/api/secret-word/reveal',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username})});
  if(currentWord) renderPreview(currentWord,true);
  stopTimer();
}

async function stopGame(){
  if(autoMode) toggleAuto();
  await fetch('/api/secret-word/stop',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username})});
  setActive(false);stopTimer();
  document.getElementById('preview').innerHTML='<div class="preview-empty">اختر كلمة ليبدأ التحدي</div>';
}

async function clearStats(){
  if(!confirm('مسح الفائزين؟'))return;
  await fetch('/api/secret-word/clear-stats',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username})});
  renderWinners([]);
}

function toggleAuto(){
  autoMode=!autoMode;
  const btn=document.getElementById('auto-btn');
  if(autoMode){btn.textContent='⏸ إيقاف الأوتوماتيك';btn.classList.add('on');document.getElementById('status-badge').textContent='🟠 أوتوماتيك';document.getElementById('status-badge').classList.add('auto');nextQuestion();}
  else{btn.textContent='▶ تشغيل أوتوماتيك';btn.classList.remove('on');document.getElementById('status-badge').classList.remove('auto');if(autoTimer){clearTimeout(autoTimer);autoTimer=null;}setActive(false);}
}

function scheduleNextAuto(){if(!autoMode)return;const w=parseInt(document.getElementById('wait-time').value)||5;autoTimer=setTimeout(()=>{if(autoMode)nextQuestion();},w*1000);}

function renderPreview(w,showAnswer){
  const letters=w.word.split('');
  const boxes=letters.map(l=>`<div class="preview-box${showAnswer?' rev':''}">${showAnswer?l:''}</div>`).join('');
  document.getElementById('preview').innerHTML=`<div style="text-align:center"><div class="preview-letters">${boxes}</div>${showAnswer?`<div class="preview-answer">${esc(w.word)}</div>`:`<div style="color:var(--muted);font-size:13px">${letters.length} حروف</div>`}${w.hint?`<div class="preview-hint">💡 ${esc(w.hint)}</div>`:''}</div>`;
}

function startTimer(s){endTime=Date.now()+s*1000;document.getElementById('timer-display').style.display='block';if(timerInt)clearInterval(timerInt);updateTimer();timerInt=setInterval(updateTimer,200);}
function stopTimer(){if(timerInt)clearInterval(timerInt);timerInt=null;}
function updateTimer(){const r=Math.max(0,endTime-Date.now());const s=Math.ceil(r/1000);const el=document.getElementById('timer-display');el.textContent=s;el.classList.remove('warning','ended');if(s<=3&&s>0)el.classList.add('warning');if(r<=0){el.classList.add('ended');clearInterval(timerInt);timerInt=null;if(currentWord){revealAnswer();if(autoMode)scheduleNextAuto();}}}
function setActive(on){document.getElementById('status-badge').classList.toggle('active',on&&!autoMode);if(!autoMode)document.getElementById('status-badge').textContent=on?'🟢 نشط':'متوقف';}

socket.on('secret-word:winner',(winner)=>{
  if(currentWord)renderPreview(currentWord,true);
  stopTimer();
  fetch(`/api/secret-word/${username}`).then(r=>r.json()).then(d=>renderWinners(d.allWinners||[]));
  if(autoMode)scheduleNextAuto();
});

function renderWinners(list){
  const el=document.getElementById('winners-list');
  if(!list.length){el.innerHTML='<div class="empty">لا يوجد فائزون بعد</div>';return;}
  el.innerHTML=list.map((w,i)=>{
    const av=w.avatar?`<img src="${w.avatar}" onerror="this.parentElement.textContent='${esc((w.name||'؟')[0])}'">`:esc((w.name||'؟')[0]);
    return`<div class="winner-item"><span class="winner-rank">${i+1}</span><div class="winner-av">${av}</div><span class="winner-name">${esc(w.name)}</span><span class="winner-wins">${w.totalWins} 🏆</span></div>`;
  }).join('');
}

function renderWordList(){
  const cat=document.getElementById('category-filter').value;
  let list=WORDS.map((w,i)=>({...w,idx:i}));
  if(cat!=='all')list=list.filter(w=>w.cat===cat);
  document.getElementById('word-list').innerHTML=list.map(w=>`
    <div class="word-item ${usedIndices.has(w.idx)?'used':''}" onclick="playWord(${w.idx})">
      <span class="word-text">${esc(w.word)}</span>
      <span class="word-cat">${esc(w.cat)}</span>
    </div>`).join('');
}

async function playWord(idx){
  const w=WORDS[idx];currentWord=w;questionIndex++;usedIndices.add(idx);
  const duration=parseInt(document.getElementById('duration').value)||30;
  const revealInterval=parseInt(document.getElementById('reveal-interval').value)||4;
  await fetch('/api/secret-word/start',{
    method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({username,word:w.word,aliases:w.aliases||[],hint:w.hint||'',category:w.cat||'',duration,revealInterval,questionIndex}),
  });
  renderPreview(w,false);startTimer(duration);setActive(true);renderWordList();
}

document.getElementById('category-filter').onchange=renderWordList;
if(username){fetch(`/api/secret-word/${username}`).then(r=>r.json()).then(d=>{if(d.allWinners)renderWinners(d.allWinners);});}
renderWordList();
</script>
