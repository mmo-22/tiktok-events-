<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>فعاليات تيك توك</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
<script src="/socket.io/socket.io.js"></script>
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --surface2: #1a1a24;
    --border: rgba(255,255,255,0.07);
    --accent: #ff0050;
    --accent2: #25f4ee;
    --text: #f0f0f5;
    --muted: #888;
    --chat-bg: #14141c;
    --green: #1dba72;
    --amber: #f59e0b;
    --radius: 14px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'Tajawal', sans-serif; overflow: hidden; }

  /* ---- Layout ---- */
  .app { display: flex; flex-direction: column; height: 100vh; }

  header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 20px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .logo { display: flex; align-items: center; gap: 10px; }
  .logo-icon {
    width: 36px; height: 36px; border-radius: 10px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; flex-shrink: 0;
  }
  .logo-name { font-size: 17px; font-weight: 700; letter-spacing: -0.3px; }
  .logo-name span { color: var(--accent); }

  .search-bar { display: flex; gap: 8px; align-items: center; }
  .search-bar input {
    background: var(--surface2); border: 1px solid var(--border);
    color: var(--text); font-family: inherit; font-size: 14px;
    padding: 8px 14px; border-radius: 10px; width: 200px; outline: none;
    transition: border-color .2s;
    direction: ltr; text-align: left;
  }
  .search-bar input:focus { border-color: var(--accent2); }
  .search-bar input::placeholder { color: var(--muted); }
  #overlay-btn {
    background: var(--surface2); border: 1px solid var(--border);
    color: var(--accent2); font-family: inherit; font-size: 13px; font-weight: 700;
    padding: 8px 12px; border-radius: 10px; cursor: pointer;
    transition: background .15s;
  }
  #overlay-btn:hover { background: rgba(37,244,238,.08); }
  #connect-btn {
    background: var(--accent); color: #fff; border: none;
    font-family: inherit; font-size: 14px; font-weight: 700;
    padding: 8px 16px; border-radius: 10px; cursor: pointer;
    transition: opacity .15s;
  }
  #connect-btn:hover { opacity: .85; }
  #connect-btn.live {
    background: var(--surface2); border: 1px solid var(--border); color: var(--muted);
  }

  .stats { display: flex; gap: 12px; align-items: center; }
  .stat {
    display: flex; align-items: center; gap: 5px;
    font-size: 13px; color: var(--muted);
  }
  .stat .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--muted); }
  .stat .dot.live { background: var(--accent); box-shadow: 0 0 6px var(--accent); animation: pulse 1.5s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
  .stat strong { color: var(--text); }

  /* ---- Main grid ---- */
  .main { display: flex; flex: 1; overflow: hidden; gap: 0; }

  /* Sidebar */
  .sidebar {
    width: 200px; flex-shrink: 0;
    background: var(--surface);
    border-left: 1px solid var(--border);
    display: flex; flex-direction: column;
    overflow: hidden;
  }
  .sidebar-title {
    font-size: 11px; font-weight: 700; letter-spacing: 1px;
    color: var(--muted); text-transform: uppercase;
    padding: 14px 16px 8px;
  }
  .gifts-feed { flex: 1; overflow-y: auto; padding: 0 10px 10px; }
  .gift-item {
    display: flex; align-items: center; gap: 8px;
    padding: 8px 8px; border-radius: 10px;
    margin-bottom: 4px; background: var(--surface2);
    animation: slideIn .3s ease;
  }
  .gift-icon { font-size: 20px; flex-shrink: 0; }
  .gift-info { flex: 1; min-width: 0; }
  .gift-user { font-size: 12px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .gift-name { font-size: 11px; color: var(--muted); }
  .gift-count { font-size: 12px; color: var(--amber); font-weight: 700; flex-shrink: 0; }

  /* Events strip */
  .events-strip {
    height: 36px; flex-shrink: 0;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center;
    overflow: hidden; position: relative;
    padding: 0 12px; gap: 0;
  }
  #events-ticker { display: flex; gap: 20px; align-items: center; white-space: nowrap; }
  .event-chip {
    display: inline-flex; align-items: center; gap: 5px;
    font-size: 12px; color: var(--muted);
    background: var(--surface2); padding: 2px 10px; border-radius: 20px;
    animation: chipIn .3s ease;
  }
  .event-chip .em { font-size: 13px; }
  .event-chip .eu { color: var(--accent2); font-weight: 600; }

  /* Chat area */
  .chat-area { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  .chat-feed {
    flex: 1; overflow-y: auto; overflow-x: hidden;
    padding: 16px 16px 8px;
    display: flex; flex-direction: column; gap: 4px;
    background: var(--chat-bg);
  }
  .chat-feed::-webkit-scrollbar { width: 4px; }
  .chat-feed::-webkit-scrollbar-track { background: transparent; }
  .chat-feed::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .message {
    display: flex; align-items: flex-start; gap: 8px;
    padding: 7px 10px; border-radius: 10px;
    transition: background .15s;
    animation: fadeUp .25s ease;
    max-width: 100%;
  }
  .message:hover { background: rgba(255,255,255,.03); }
  .message.highlight { background: rgba(37, 244, 238, .06); border-right: 2px solid var(--accent2); }
  .message.mod { background: rgba(255,0,80,.06); border-right: 2px solid var(--accent); }

  .avatar {
    width: 28px; height: 28px; border-radius: 50%;
    flex-shrink: 0; overflow: hidden;
    background: var(--surface2);
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; color: var(--muted);
    font-weight: 700;
  }
  .avatar img { width: 100%; height: 100%; object-fit: cover; }

  .msg-body { flex: 1; min-width: 0; }
  .msg-header { display: flex; align-items: center; gap: 6px; margin-bottom: 1px; }
  .msg-user { font-size: 12px; font-weight: 700; color: var(--accent2); }
  .msg-user.mod { color: var(--accent); }
  .badge {
    font-size: 9px; font-weight: 700; padding: 1px 5px;
    border-radius: 4px; text-transform: uppercase; letter-spacing: .5px;
  }
  .badge.mod-badge { background: rgba(255,0,80,.25); color: var(--accent); }
  .badge.sub-badge { background: rgba(37,244,238,.2); color: var(--accent2); }
  .badge.follow-badge { background: rgba(29,186,114,.2); color: #1dba72; }
  .msg-text { font-size: 14px; line-height: 1.5; word-break: break-word; color: #ddd; }

  /* Empty state */
  .empty-state {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    color: var(--muted); gap: 12px; text-align: center; padding: 20px;
  }
  .empty-icon { font-size: 48px; }
  .empty-title { font-size: 16px; font-weight: 700; color: var(--text); }
  .empty-sub { font-size: 13px; }

  /* Status banner */
  #status-banner {
    padding: 6px 16px; font-size: 12px; text-align: center;
    transition: all .3s; display: none; flex-shrink: 0;
  }
  #status-banner.show { display: block; }
  #status-banner.connecting { background: rgba(37,244,238,.1); color: var(--accent2); }
  #status-banner.connected { background: rgba(29,186,114,.1); color: var(--green); }
  #status-banner.error { background: rgba(255,0,80,.1); color: var(--accent); }
  #status-banner.disconnected { background: rgba(255,255,255,.04); color: var(--muted); }

  /* Scroll to bottom btn */
  #scroll-btn {
    position: absolute; bottom: 12px; left: 50%; transform: translateX(-50%);
    background: var(--accent); color: #fff; border: none;
    font-family: inherit; font-size: 12px; font-weight: 700;
    padding: 5px 14px; border-radius: 20px; cursor: pointer;
    display: none; z-index: 10;
    box-shadow: 0 4px 12px rgba(255,0,80,.4);
  }
  .chat-wrapper { position: relative; flex: 1; display: flex; flex-direction: column; overflow: hidden; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes slideIn {
    from { opacity: 0; transform: translateX(-8px); }
    to   { opacity: 1; transform: translateX(0); }
  }
  @keyframes chipIn {
    from { opacity: 0; transform: scale(.9); }
    to   { opacity: 1; transform: scale(1); }
  }
</style>
</head>
<body>
<div class="app">
  <!-- Header -->
  <header>
    <div class="logo">
      <div class="logo-icon">🎵</div>
      <div class="logo-name">TikTok <span>Live</span> Reader</div>
    </div>

    <div class="search-bar">
      <input type="text" id="username-input" placeholder="@username" dir="ltr">
      <button id="overlay-btn" title="Generate Overlay URL">🎬 Overlay</button>
      <button id="connect-btn">اتصل</button>
    </div>

    <!-- Overlay Modal -->
    <div id="overlay-modal" style="display:none;position:fixed;inset:0;z-index:100;background:rgba(0,0,0,.7);backdrop-filter:blur(4px);align-items:center;justify-content:center;">
      <div style="background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:24px;max-width:480px;width:90%;position:relative;">
        <button id="close-modal" style="position:absolute;top:12px;left:12px;background:none;border:none;color:var(--muted);font-size:18px;cursor:pointer;">✕</button>
        <h3 style="font-size:16px;font-weight:700;margin-bottom:4px;">🎬 Overlay URL</h3>
        <p style="font-size:12px;color:var(--muted);margin-bottom:16px;">حط هالرابط في OBS كـ Browser Source</p>

        <div style="margin-bottom:12px;">
          <label style="font-size:11px;color:var(--muted);display:block;margin-bottom:4px;">يوزرنيم (مطلوب)</label>
          <input id="ov-user" type="text" placeholder="@username" dir="ltr"
            style="width:100%;background:var(--surface2);border:1px solid var(--border);color:var(--text);font-family:inherit;font-size:13px;padding:8px 10px;border-radius:8px;outline:none;">
        </div>

        <div style="display:flex;gap:10px;margin-bottom:16px;">
          <div style="flex:1;">
            <label style="font-size:11px;color:var(--muted);display:block;margin-bottom:4px;">عدد الرسائل</label>
            <input id="ov-max" type="number" value="8" min="1" max="20" dir="ltr"
              style="width:100%;background:var(--surface2);border:1px solid var(--border);color:var(--text);font-family:inherit;font-size:13px;padding:8px 10px;border-radius:8px;outline:none;">
          </div>
        </div>

        <button id="gen-btn" style="width:100%;background:var(--accent);color:#fff;border:none;font-family:inherit;font-size:14px;font-weight:700;padding:10px;border-radius:10px;cursor:pointer;margin-bottom:12px;">
          Generate
        </button>

        <div id="ov-result" style="display:none;">
          <div style="font-size:11px;color:var(--muted);margin-bottom:6px;">الرابط:</div>
          <div style="display:flex;gap:6px;align-items:center;">
            <input id="ov-url" readonly dir="ltr"
              style="flex:1;background:var(--surface2);border:1px solid var(--border);color:var(--accent2);font-family:monospace;font-size:11px;padding:7px 10px;border-radius:8px;outline:none;cursor:text;">
            <button id="copy-btn" style="background:var(--surface2);border:1px solid var(--border);color:var(--text);font-family:inherit;font-size:12px;padding:7px 12px;border-radius:8px;cursor:pointer;white-space:nowrap;">نسخ</button>
          </div>
          <p style="font-size:11px;color:var(--muted);margin-top:8px;">في OBS: Add Source → Browser → الصق الرابط → الحجم 800×600 أو حسب شاشتك</p>
        </div>
      </div>
    </div>

    <div class="stats">
      <div class="stat">
        <div class="dot" id="status-dot"></div>
        <span id="status-text">غير متصل</span>
      </div>
      <div class="stat">
        👁️ <strong id="viewers-count">—</strong>
      </div>
      <div class="stat">
        💬 <strong id="chat-count">0</strong>
      </div>
    </div>
  </header>

  <!-- Events strip -->
  <div class="events-strip">
    <div id="events-ticker"></div>
  </div>

  <!-- Status banner -->
  <div id="status-banner"></div>

  <!-- Main -->
  <div class="main">
    <!-- Chat area -->
    <div class="chat-area">
      <div class="chat-wrapper">
        <div class="chat-feed" id="chat-feed">
          <div class="empty-state" id="empty-state">
            <div class="empty-icon">🎯</div>
            <div class="empty-title">أدخل يوزرنيم وابدأ</div>
            <div class="empty-sub">سيظهر هنا chat أي بث مباشر على TikTok</div>
          </div>
        </div>
        <button id="scroll-btn">⬇ رسائل جديدة</button>
      </div>
    </div>

    <!-- Sidebar: Gifts -->
    <div class="sidebar">
      <div class="sidebar-title">🎁 الهدايا</div>
      <div class="gifts-feed" id="gifts-feed">
        <div style="color:var(--muted);font-size:12px;padding:8px;text-align:center">لا هدايا بعد</div>
      </div>
    </div>
  </div>
</div>

<script>
const socket = io();

let chatCount = 0;
let isLive = false;
let autoScroll = true;

const feed = document.getElementById('chat-feed');
const giftsFeed = document.getElementById('gifts-feed');
const emptyState = document.getElementById('empty-state');
const scrollBtn = document.getElementById('scroll-btn');
const statusDot = document.getElementById('status-dot');
const statusText = document.getElementById('status-text');
const banner = document.getElementById('status-banner');
const viewersEl = document.getElementById('viewers-count');
const chatCountEl = document.getElementById('chat-count');
const ticker = document.getElementById('events-ticker');
const usernameInput = document.getElementById('username-input');
const connectBtn = document.getElementById('connect-btn');

// --- Auto scroll ---
feed.addEventListener('scroll', () => {
  const atBottom = feed.scrollHeight - feed.scrollTop - feed.clientHeight < 60;
  autoScroll = atBottom;
  scrollBtn.style.display = atBottom ? 'none' : 'block';
});
scrollBtn.addEventListener('click', () => { scrollToBottom(); autoScroll = true; });
function scrollToBottom() { feed.scrollTop = feed.scrollHeight; scrollBtn.style.display = 'none'; }

// --- Connect ---
connectBtn.addEventListener('click', () => {
  if (isLive) {
    socket.emit('leave');
    connectBtn.textContent = 'اتصل';
    connectBtn.classList.remove('live');
    isLive = false;
    return;
  }
  const u = usernameInput.value.trim();
  if (!u) { usernameInput.focus(); return; }
  // Clear old messages and dedup set on new connection
  feed.innerHTML = '';
  seenMsgIds.clear();
  chatCount = 0;
  chatCountEl.textContent = '0';
  socket.emit('join', { username: u });
});
usernameInput.addEventListener('keydown', e => { if (e.key === 'Enter') connectBtn.click(); });

// --- Avatar helper ---
function avatar(url, name) {
  if (url) return `<img src="${url}" onerror="this.parentElement.textContent='${(name||'?')[0].toUpperCase()}'">`;
  return (name||'?')[0].toUpperCase();
}

// --- Dedup set ---
const seenMsgIds = new Set();

// --- Add message ---
function addMessage({ id, user, uniqueId, avatar: av, comment, isModerator, isSubscriber, followRole, topGifterRank, gifterLevel, teamMemberLevel }) {
  // Prevent duplicate messages
  const msgKey = id || (user + ':' + comment + ':' + Math.floor(Date.now()/2000));
  if (seenMsgIds.has(msgKey)) return;
  seenMsgIds.add(msgKey);
  // Keep set small
  if (seenMsgIds.size > 500) {
    const arr = [...seenMsgIds];
    for (let i = 0; i < 200; i++) seenMsgIds.delete(arr[i]);
  }

  if (emptyState) emptyState.remove();
  chatCount++;
  chatCountEl.textContent = chatCount;

  const isMod = isModerator;
  const isSub = isSubscriber;
  const isFollow = followRole >= 1;

  let badges = '';
  if (isMod) badges += '<span class="badge mod-badge">مشرف</span>';
  if (isSub) badges += '<span class="badge sub-badge">مشترك</span>';
  if (isFollow && !isMod) badges += '<span class="badge follow-badge">متابع</span>';

  const div = document.createElement('div');
  div.className = 'message' + (isMod ? ' mod' : isFollow ? ' highlight' : '');
  div.innerHTML = `
    <div class="avatar">${avatar(av, user)}</div>
    <div class="msg-body">
      <div class="msg-header">
        <span class="msg-user${isMod ? ' mod' : ''}">${escHtml(user)}</span>
        ${badges}
      </div>
      <div class="msg-text">${escHtml(comment)}</div>
    </div>`;

  feed.appendChild(div);
  if (autoScroll) scrollToBottom();

  // Keep max 200 messages
  while (feed.children.length > 200) feed.removeChild(feed.firstChild);
}

// --- Add event to ticker ---
function addEvent(icon, user, text) {
  const chip = document.createElement('span');
  chip.className = 'event-chip';
  chip.innerHTML = `<span class="em">${icon}</span><span class="eu">${escHtml(user)}</span><span>${escHtml(text)}</span>`;
  ticker.appendChild(chip);
  if (ticker.children.length > 20) ticker.removeChild(ticker.firstChild);
}

// --- Add gift ---
function addGift({ user, avatar: av, giftName, repeatCount, diamondCount }) {
  const firstChild = giftsFeed.querySelector('div:not(.gift-item)');
  if (firstChild) firstChild.remove();

  const div = document.createElement('div');
  div.className = 'gift-item';
  div.innerHTML = `
    <div class="gift-icon">🎁</div>
    <div class="gift-info">
      <div class="gift-user">${escHtml(user)}</div>
      <div class="gift-name">${escHtml(giftName)}</div>
    </div>
    <div class="gift-count">x${repeatCount}</div>`;
  giftsFeed.insertBefore(div, giftsFeed.firstChild);
  while (giftsFeed.children.length > 30) giftsFeed.removeChild(giftsFeed.lastChild);
}

// --- Status ---
function setStatus(type, msg) {
  banner.textContent = msg;
  banner.className = 'show ' + type;
  setTimeout(() => { if (banner.className.includes(type)) banner.classList.remove('show'); }, 4000);

  if (type === 'connected') {
    statusDot.className = 'dot live';
    statusText.textContent = 'مباشر';
    connectBtn.textContent = 'قطع';
    connectBtn.classList.add('live');
    isLive = true;
  } else if (type === 'connecting') {
    statusDot.className = 'dot';
    statusText.textContent = 'جاري الاتصال...';
  } else {
    statusDot.className = 'dot';
    statusText.textContent = 'غير متصل';
    connectBtn.textContent = 'اتصل';
    connectBtn.classList.remove('live');
    isLive = false;
  }
}

function escHtml(str) {
  return String(str || '')
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// --- Overlay modal ---
const overlayBtn = document.getElementById('overlay-btn');
const overlayModal = document.getElementById('overlay-modal');
const closeModal = document.getElementById('close-modal');
const genBtn = document.getElementById('gen-btn');
const ovUser = document.getElementById('ov-user');
const ovMax = document.getElementById('ov-max');
const ovResult = document.getElementById('ov-result');
const ovUrl = document.getElementById('ov-url');
const copyBtn = document.getElementById('copy-btn');

overlayBtn.addEventListener('click', () => {
  ovUser.value = usernameInput.value.trim().replace('@','');
  overlayModal.style.display = 'flex';
});
closeModal.addEventListener('click', () => overlayModal.style.display = 'none');
overlayModal.addEventListener('click', e => { if (e.target === overlayModal) overlayModal.style.display = 'none'; });

genBtn.addEventListener('click', () => {
  const u = ovUser.value.trim().replace('@','');
  if (!u) { ovUser.focus(); return; }
  const max = ovMax.value || 8;
  const url = `${location.origin}/overlay.html?user=${encodeURIComponent(u)}&max=${max}`;
  ovUrl.value = url;
  ovResult.style.display = 'block';
});

copyBtn.addEventListener('click', () => {
  navigator.clipboard.writeText(ovUrl.value).then(() => {
    copyBtn.textContent = '✓ تم';
    setTimeout(() => copyBtn.textContent = 'نسخ', 2000);
  });
});

// --- Socket events ---
socket.on('room:status', ({ username, status, message, viewers }) => {
  if (status === 'connected') setStatus('connected', 'متصل بـ @' + username);
  else if (status === 'connecting' || status === 'retrying') setStatus('connecting', 'جاري الاتصال بـ @' + username + '...');
  else if (status === 'error') setStatus('error', '⚠️ خطأ في الاتصال' + (message ? ': ' + message : ''));
  else if (status === 'ended') setStatus('disconnected', 'انتهى البث');
  else if (status === 'disconnected') setStatus('disconnected', 'انقطع الاتصال — جاري إعادة المحاولة...');
  if (viewers) viewersEl.textContent = viewers.toLocaleString();
});
socket.on('status', ({ type, message, viewerCount }) => {
  setStatus(type, message);
  if (viewerCount) viewersEl.textContent = viewerCount.toLocaleString();
});
socket.on('history', (messages) => {
  messages.forEach(msg => {
    if (msg.type === 'chat') addMessage(msg);
    else if (msg.type === 'gift') addGift(msg);
    else if (msg.type === 'follow') addEvent('➕', msg.user, 'تابع الحساب');
    else if (msg.type === 'member' && msg.actionId === 1) addEvent('👋', msg.user, 'انضم للبث');
  });
});
socket.on('stats', (stats) => {
  if (stats.viewers) viewersEl.textContent = stats.viewers.toLocaleString();
});
socket.on('error', ({ message }) => setStatus('error', '⚠️ ' + message));
socket.on('chat', addMessage);
socket.on('gift', (data) => {
  addGift(data);
  addEvent('🎁', data.user, `أرسل ${data.giftName} x${data.repeatCount}`);
});
socket.on('like', ({ user, totalLikeCount }) => {
  viewersEl.textContent; // just update viewers
  addEvent('❤️', user, 'أعجب بالبث');
});
socket.on('member', ({ user, actionId }) => {
  if (actionId === 1) addEvent('👋', user, 'انضم للبث');
});
socket.on('share', ({ user }) => addEvent('🔗', user, 'شارك البث'));
socket.on('follow', ({ user }) => addEvent('➕', user, 'تابع الحساب'));
socket.on('viewers', ({ count }) => {
  viewersEl.textContent = count.toLocaleString();
});
</script>
