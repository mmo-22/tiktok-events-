<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>Ice Overlay</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
<script src="/socket.io/socket.io.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{background:transparent;width:100vw;height:100vh;font-family:'Tajawal',sans-serif;overflow:hidden;display:flex;align-items:center;justify-content:center}
.main{position:relative;background:rgba(0,10,30,.92);border:2px solid rgba(56,189,248,.4);border-radius:22px;padding:24px 28px;width:560px;opacity:0;transition:opacity .15s;overflow:hidden}
.main.show{opacity:1}
.main::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,#38bdf8,#818cf8,#38bdf8)}

.title{font-size:16px;color:rgba(255,255,255,.4);text-align:center;margin-bottom:6px}.title span{color:#38bdf8;font-weight:900}
.phase-label{text-align:center;font-size:14px;color:#fbbf24;font-weight:700;margin-bottom:10px}

.word-box{text-align:center;padding:20px;margin-bottom:14px;background:rgba(56,189,248,.06);border:2px solid rgba(56,189,248,.3);border-radius:16px;position:relative;overflow:hidden}
.word-text{font-size:36px;font-weight:900;color:#fff;letter-spacing:4px;position:relative;z-index:1}
.word-sub{font-size:13px;color:rgba(255,255,255,.4);margin-top:4px;position:relative;z-index:1}
.ice-effect{position:absolute;inset:0;background:linear-gradient(135deg,rgba(56,189,248,.1),rgba(129,140,248,.05));pointer-events:none}

.stats-row{display:flex;justify-content:center;gap:20px;margin-bottom:12px}
.stat{text-align:center}
.stat-num{font-size:22px;font-weight:900;color:#fff}
.stat-label{font-size:10px;color:rgba(255,255,255,.3)}

.timer-bar{height:6px;background:rgba(255,255,255,.06);border-radius:3px;margin-bottom:12px;overflow:hidden}
.timer-fill{height:100%;background:linear-gradient(90deg,#38bdf8,#818cf8);border-radius:3px;transition:width .15s linear}
.timer-fill.warn{background:linear-gradient(90deg,#f59e0b,#ef4444)}

.feed{display:flex;flex-direction:column;gap:3px;max-height:100px;overflow:hidden;margin-bottom:10px}
.feed-item{padding:5px 12px;border-radius:8px;font-size:12px;font-weight:600;animation:slideIn .3s ease}
.feed-item.join{background:rgba(56,189,248,.08);color:#38bdf8}
.feed-item.unfreeze{background:rgba(34,197,94,.1);color:#22c55e}
.feed-item.frozen{background:rgba(239,68,68,.08);color:#ef4444}
@keyframes slideIn{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}

.frozen-row{display:flex;flex-wrap:nowrap;justify-content:center;gap:4px;margin-bottom:10px;overflow:hidden;max-height:34px}
.frozen-avatar{width:30px;height:30px;border-radius:50%;border:2px solid #ef4444;overflow:hidden;opacity:.5;animation:elimPop .3s ease}
.frozen-avatar img{width:100%;height:100%;object-fit:cover;filter:grayscale(.5)}
@keyframes elimPop{0%{transform:scale(0)}100%{transform:scale(1)}}

.reg-banner{text-align:center;padding:14px}
.reg-title{font-size:15px;color:#fbbf24;font-weight:900;margin-bottom:4px}
.reg-keyword{font-size:20px;font-weight:900;color:#fff}
.reg-count{font-size:13px;color:rgba(255,255,255,.4);margin-top:4px}

.winner-box{position:absolute;inset:0;background:rgba(0,10,30,.9);backdrop-filter:blur(12px);display:none;flex-direction:column;align-items:center;justify-content:center;border-radius:22px;z-index:10}
.winner-box.show{display:flex;animation:fadeIn .5s ease}
.winner-icon{font-size:52px;margin-bottom:6px}
.winner-name{font-size:26px;font-weight:900;color:#38bdf8}
.winner-sub{font-size:14px;color:rgba(255,255,255,.4);margin-top:4px}
@keyframes fadeIn{from{opacity:0;transform:scale(.9)}to{opacity:1;transform:scale(1)}}

.confetti{position:absolute;inset:0;pointer-events:none;overflow:hidden}
</style>
</head>
<body>
<div class="main" id="box">
  <div class="title">🧊 <span>الجليد</span></div>
  <div class="phase-label" id="phase-label"></div>
  <div class="reg-banner" id="reg-banner" style="display:none">
    <div class="reg-title">اكتب في الشات عشان تشارك</div>
    <div class="reg-keyword" id="reg-keyword">جليد</div>
    <div class="reg-count" id="reg-count">0 لاعب</div>
    <div class="reg-slots" id="reg-slots" style="display:flex;flex-wrap:wrap;justify-content:center;gap:4px;margin-top:10px;max-height:72px;overflow:hidden"></div>
  </div>
  <div class="stats-row" id="stats-row" style="display:none">
    <div class="stat"><div class="stat-num" id="alive-num">0</div><div class="stat-label">باقي</div></div>
    <div class="stat"><div class="stat-num" id="round-num">0</div><div class="stat-label">الجولة</div></div>
    <div class="stat"><div class="stat-num" id="frozen-num">0</div><div class="stat-label">متجمد</div></div>
  </div>
  <div class="word-box" id="word-box" style="display:none">
    <div class="ice-effect"></div>
    <div class="word-text" id="word-text"></div>
    <div class="word-sub">اكتب الكلمة عشان تذوب! 🔥</div>
  </div>
  <div class="timer-bar" id="timer-bar" style="display:none"><div class="timer-fill" id="timer-fill"></div></div>
  <div class="feed" id="feed"></div>
  <div class="frozen-row" id="frozen-row"></div>
  <div class="winner-box" id="winner-box">
    <div class="winner-icon">🏆</div>
    <div class="winner-name" id="winner-name"></div>
    <div class="winner-sub">الناجي الأخير!</div>
  </div>
  <div class="confetti" id="confetti"></div>
</div>
<script>
var params=new URLSearchParams(location.search),username=params.get('username')||'';
var socket=io();if(username)socket.emit('join',{username});
var timerInt=null;
var COLORS=['#38bdf8','#818cf8','#22c55e','#fbbf24','#ec4899','#f59e0b'];

socket.on('ice:register',function(d){
  document.getElementById('box').classList.add('show');
  document.getElementById('reg-banner').style.display='block';
  document.getElementById('reg-keyword').textContent=d.keyword;
  document.getElementById('reg-count').textContent='0 لاعب';
  document.getElementById('word-box').style.display='none';
  document.getElementById('timer-bar').style.display='none';
  document.getElementById('stats-row').style.display='none';
  document.getElementById('winner-box').classList.remove('show');
  document.getElementById('frozen-row').innerHTML='';
  document.getElementById('feed').innerHTML='';
  document.getElementById('phase-label').textContent='📝 مرحلة التسجيل';
});

socket.on('ice:joined',function(d){
  document.getElementById('reg-count').textContent=d.count+' / '+(d.max||20)+' لاعب';
  addFeed('join','🧊 '+d.player+' دخل');
  var el=document.getElementById('reg-slots');
  var div=document.createElement('div');
  div.style.cssText='width:30px;height:30px;border-radius:50%;border:2px solid #38bdf8;overflow:hidden;animation:elimPop .3s ease';
  if(d.avatar){
    div.innerHTML='<img src="'+d.avatar+'" style="width:100%;height:100%;object-fit:cover" onerror="this.parentElement.textContent=\'✓\'">';
  } else {
    div.style.cssText+='display:flex;align-items:center;justify-content:center;background:rgba(56,189,248,.15);font-size:10px;color:#38bdf8';
    div.textContent='✓';
  }
  el.appendChild(div);
});

socket.on('ice:locked',function(d){
  document.getElementById('reg-banner').style.display='none';
  document.getElementById('stats-row').style.display='flex';
  document.getElementById('alive-num').textContent=d.count;
  document.getElementById('phase-label').textContent='🔒 التسجيل مقفل — '+d.count+' لاعب';
});

socket.on('ice:freeze',function(d){
  document.getElementById('reg-banner').style.display='none';
  document.getElementById('word-box').style.display='block';
  document.getElementById('timer-bar').style.display='block';
  document.getElementById('stats-row').style.display='flex';
  document.getElementById('word-text').textContent=d.word;
  document.getElementById('round-num').textContent=d.round;
  document.getElementById('alive-num').textContent=d.aliveCount;
  document.getElementById('frozen-num').textContent=d.aliveCount;
  document.getElementById('phase-label').textContent='❄️ الكل متجمد! اكتب الكلمة عشان تذوب!';
  // Timer
  var fill=document.getElementById('timer-fill');
  fill.style.width='100%';fill.classList.remove('warn');
  var total=d.answerTime*1000,start=Date.now();
  if(timerInt)clearInterval(timerInt);
  timerInt=setInterval(function(){
    var pct=Math.max(0,100-(Date.now()-start)/total*100);
    fill.style.width=pct+'%';
    if(pct<25)fill.classList.add('warn');
    if(pct<=0){clearInterval(timerInt);timerInt=null;}
  },50);
});

socket.on('ice:unfreeze',function(d){
  document.getElementById('frozen-num').textContent=d.stillFrozen;
  addFeed('unfreeze','🔥 '+d.player+' ذاب!');
});

socket.on('ice:round-end',function(d){
  if(timerInt){clearInterval(timerInt);timerInt=null;}
  document.getElementById('timer-bar').style.display='none';
  document.getElementById('alive-num').textContent=d.aliveCount;
  document.getElementById('phase-label').textContent='📊 النتائج — '+d.aliveCount+' باقي';
  // Show frozen losers
  d.frozen.forEach(function(p){
    addFeed('frozen','❌ '+p.name+' تجمد!');
    var el=document.getElementById('frozen-row');
    var div=document.createElement('div');div.className='frozen-avatar';
    if(p.avatar)div.innerHTML='<img src="'+p.avatar+'">';
    else{div.style.cssText+='display:flex;align-items:center;justify-content:center;background:rgba(239,68,68,.2);font-size:10px;color:#ef4444';div.textContent='❌';}
    el.appendChild(div);
    while(el.children.length>8)el.removeChild(el.firstChild);
  });
  if(d.winner){
    document.getElementById('winner-name').textContent=d.winner.name;
    document.getElementById('winner-box').classList.add('show');
    document.getElementById('phase-label').textContent='🏆 الناجي!';
    fireConfetti();
  }
});

socket.on('ice:stopped',function(){document.getElementById('box').classList.remove('show');if(timerInt)clearInterval(timerInt);});

function addFeed(type,text){var el=document.getElementById('feed');var div=document.createElement('div');div.className='feed-item '+type;div.textContent=text;el.prepend(div);while(el.children.length>6)el.removeChild(el.lastChild);}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function fireConfetti(){var layer=document.getElementById('confetti'),box=document.getElementById('box'),cx=box.offsetWidth/2,cy=box.offsetHeight/2;for(var i=0;i<35;i++){var p=document.createElement('div');p.style.cssText='position:absolute;width:7px;height:11px;left:'+cx+'px;top:'+cy+'px;background:'+COLORS[i%COLORS.length]+';border-radius:2px;';layer.appendChild(p);var a=Math.random()*Math.PI*2,d=80+Math.random()*200;p.animate([{transform:'translate(0,0) rotate(0deg)',opacity:1},{transform:'translate('+Math.cos(a)*d+'px,'+Math.sin(a)*d+'px) rotate('+(600+Math.random()*600)+'deg)',opacity:0}],{duration:1400+Math.random()*500,easing:'cubic-bezier(0.4,0,0.6,1)'});setTimeout(function(el){el.remove()}.bind(null,p),2000);}}
</script>
<script src="/rules-overlay.js"></script>
</body>
</html>
