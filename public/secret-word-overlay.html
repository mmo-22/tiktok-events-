<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Secret Word Overlay</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
<script src="/socket.io/socket.io.js"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body { background:transparent; width:100vw; height:100vh; font-family:'Tajawal',sans-serif; overflow:hidden; display:flex; align-items:center; justify-content:center; }
:root { --scale:1; }
.main-box {
  position:relative;
  background:rgba(0,0,0,.92);
  border:2px solid rgba(168,85,247,.5);
  border-radius:22px;
  padding:calc(24px * var(--scale)) calc(32px * var(--scale));
  min-width:calc(500px * var(--scale));
  max-width:calc(780px * var(--scale));
  opacity:0; pointer-events:none;
  transition:opacity .15s;
  overflow:hidden;
}
.main-box.show { opacity:1; }

.game-title {
  font-size:calc(18px * var(--scale)); color:rgba(255,255,255,.5);
  text-align:center; margin-bottom:calc(8px * var(--scale));
}
.game-title span { color:#a855f7; font-weight:900; }

.category-badge {
  text-align:center; margin-bottom:calc(14px * var(--scale));
  font-size:calc(13px * var(--scale)); color:#fbbf24; font-weight:700;
}

.letters-row {
  display:flex; justify-content:center; gap:calc(8px * var(--scale));
  flex-wrap:wrap; margin-bottom:calc(18px * var(--scale));
  direction:rtl;
}
.letter-box {
  width:calc(52px * var(--scale)); height:calc(60px * var(--scale));
  border:2px solid rgba(168,85,247,.4);
  border-radius:calc(10px * var(--scale));
  background:rgba(168,85,247,.08);
  display:flex; align-items:center; justify-content:center;
  font-size:calc(28px * var(--scale)); font-weight:900; color:#fff;
  transition:all .4s cubic-bezier(0.34,1.56,0.64,1);
}
.letter-box.revealed {
  background:rgba(168,85,247,.25);
  border-color:#a855f7;
  animation:letterPop .5s cubic-bezier(0.34,1.56,0.64,1);
}
.letter-box.final {
  background:rgba(29,186,114,.25);
  border-color:#1dba72;
  color:#1dba72;
}
@keyframes letterPop {
  0% { transform:scale(.5) rotateY(90deg); }
  60% { transform:scale(1.15) rotateY(0deg); }
  100% { transform:scale(1); }
}

.hint-text {
  font-size:calc(18px * var(--scale)); color:#fbbf24;
  text-align:center; margin-bottom:calc(14px * var(--scale));
  font-weight:700; display:none;
}

.timer-row {
  display:flex; justify-content:center; align-items:center; gap:calc(10px * var(--scale));
  margin-bottom:calc(16px * var(--scale));
}
.timer-circle { width:calc(56px * var(--scale)); height:calc(56px * var(--scale)); position:relative; }
.timer-circle svg { width:100%; height:100%; transform:rotate(-90deg); }
.timer-bg { fill:none; stroke:rgba(255,255,255,.1); stroke-width:5; }
.timer-fg { fill:none; stroke:#a855f7; stroke-width:5; stroke-linecap:round; transition:stroke-dashoffset 0.95s linear, stroke 0.3s; }
.timer-fg.warn { stroke:#f59e0b; }
.timer-fg.danger { stroke:#ff0050; }
.timer-text { position:absolute; inset:0; display:flex; align-items:center; justify-content:center; font-size:calc(18px * var(--scale)); font-weight:900; color:#fff; }
.timer-text.danger { color:#ff0050; }

.reveal-badge {
  text-align:center; font-size:calc(26px * var(--scale)); font-weight:900;
  color:#1dba72; margin-bottom:calc(12px * var(--scale));
  background:rgba(29,186,114,.12); border:2px solid rgba(29,186,114,.45);
  border-radius:14px; padding:calc(10px * var(--scale)) calc(20px * var(--scale));
  display:none; animation:revealPop .5s cubic-bezier(0.34,1.56,0.64,1);
}
.reveal-badge.show { display:block; }
@keyframes revealPop { 0%{transform:scale(.5);opacity:0} 60%{transform:scale(1.1)} 100%{transform:scale(1);opacity:1} }

.winner-banner {
  text-align:center; margin-bottom:calc(10px * var(--scale));
  display:none;
}
.winner-banner.show { display:block; animation:revealPop .5s cubic-bezier(0.34,1.56,0.64,1); }
.winner-av { width:calc(48px * var(--scale)); height:calc(48px * var(--scale)); border-radius:50%; border:3px solid #ffd700; margin:0 auto calc(6px * var(--scale)); overflow:hidden; background:rgba(255,255,255,.1); display:flex; align-items:center; justify-content:center; }
.winner-av img { width:100%; height:100%; object-fit:cover; }
.winner-name { font-size:calc(16px * var(--scale)); font-weight:900; color:#ffd700; }

.divider { height:1px; background:rgba(168,85,247,.15); margin:0 0 calc(14px * var(--scale)); }

.lb-title { font-size:calc(13px * var(--scale)); font-weight:900; color:#a855f7; text-align:center; margin-bottom:calc(10px * var(--scale)); }
.lb-items { display:flex; justify-content:center; align-items:center; gap:calc(8px * var(--scale)); flex-wrap:wrap; }
.lb-item { display:flex; flex-direction:column; align-items:center; gap:calc(4px * var(--scale)); padding:calc(6px * var(--scale)) calc(8px * var(--scale)); border-radius:10px; background:rgba(255,255,255,.04); width:calc(90px * var(--scale)); }
.lb-item.empty { opacity:.2; }
.lb-item.rank-1 { background:rgba(255,215,0,.15); border:1px solid rgba(255,215,0,.35); }
.lb-item.rank-2 { background:rgba(192,192,192,.1); border:1px solid rgba(192,192,192,.25); }
.lb-item.rank-3 { background:rgba(205,127,50,.1); border:1px solid rgba(205,127,50,.25); }
.lb-rank { font-size:calc(16px * var(--scale)); }
.lb-av2 { width:calc(38px * var(--scale)); height:calc(38px * var(--scale)); border-radius:50%; overflow:hidden; background:rgba(255,255,255,.08); border:2px solid rgba(255,255,255,.15); display:flex; align-items:center; justify-content:center; font-size:calc(15px * var(--scale)); font-weight:700; color:#aaa; }
.lb-av2 img { width:100%; height:100%; object-fit:cover; }
.lb-name2 { font-size:calc(11px * var(--scale)); font-weight:700; color:#f0f0f5; max-width:calc(85px * var(--scale)); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; text-align:center; }
.lb-count2 { font-size:calc(10px * var(--scale)); color:#a855f7; font-weight:700; background:rgba(168,85,247,.12); padding:2px 7px; border-radius:20px; }
.lb-empty-name { font-size:calc(10px * var(--scale)); color:rgba(255,255,255,.2); }

.confetti-layer { position:absolute; inset:0; pointer-events:none; overflow:hidden; }
</style>
</head>
<body>
<div class="main-box" id="box">
  <div class="game-title">🔐 <span>كلمة السر</span></div>
  <div class="category-badge" id="category" style="display:none"></div>
  <div class="letters-row" id="letters-row"></div>
  <div class="hint-text" id="hint">💡 <span id="hint-text"></span></div>
  <div class="timer-row" id="timer-row" style="display:none">
    <div class="timer-circle">
      <svg viewBox="0 0 100 100">
        <circle class="timer-bg" cx="50" cy="50" r="42"></circle>
        <circle class="timer-fg" id="timer-fg" cx="50" cy="50" r="42" stroke-dasharray="263.89" stroke-dashoffset="0"></circle>
      </svg>
      <div class="timer-text" id="timer-text">30</div>
    </div>
  </div>
  <div class="winner-banner" id="winner-banner">
    <div class="winner-av" id="winner-av">?</div>
    <div class="winner-name" id="winner-name"></div>
  </div>
  <div class="reveal-badge" id="reveal-badge">✅ <span id="reveal-word"></span></div>
  <div class="divider"></div>
  <div class="lb-title">🏆 أسرع المخمنين</div>
  <div class="lb-items" id="lb-items"></div>
  <div class="confetti-layer" id="confetti-layer"></div>
</div>

<script>
const params = new URLSearchParams(location.search);
const cfg = { username: params.get('username') || '' };
const socket = io({ transports:['websocket','polling'], reconnection:true });
const CIRCLE = 263.89;
let timerInt = null, endTime = 0, totalDuration = 30;
let currentLetters = [];

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function joinRoom() {
  if (!cfg.username) return;
  socket.emit('join', { username: cfg.username });
  fetch(`/api/secret-word/${cfg.username}`).then(r=>r.json()).then(d => {
    renderLeaderboard(d.allWinners || []);
    if (d.active) {
      renderLetters(d.length, d.revealedIndices, d.letters);
      const remainMs = Math.max(0, d.endTime - Date.now());
      startTimer(Math.ceil(remainMs/1000), d.duration);
      document.getElementById('box').classList.add('show');
      if (d.category) { document.getElementById('category').textContent = d.category; document.getElementById('category').style.display = 'block'; }
    } else if (d.revealed && d.word) {
      showFullWord(d.word);
    }
  });
}
socket.on('connect', joinRoom);
joinRoom();

socket.on('secret-word:question', ({ length, revealedIndices, letters, hint, category, duration }) => {
  hideReveal();
  document.getElementById('winner-banner').classList.remove('show');
  renderLetters(length, revealedIndices, letters);
  if (category) { document.getElementById('category').textContent = category; document.getElementById('category').style.display = 'block'; }
  else { document.getElementById('category').style.display = 'none'; }
  document.getElementById('hint').style.display = 'none';
  totalDuration = duration || 30;
  startTimer(duration, duration);
  document.getElementById('box').classList.add('show');
});

socket.on('secret-word:reveal-letter', ({ revealedIndices, letters }) => {
  updateLetters(revealedIndices, letters);
});

socket.on('secret-word:hint', ({ hint }) => {
  if (hint) {
    document.getElementById('hint-text').textContent = hint;
    document.getElementById('hint').style.display = 'block';
    document.getElementById('hint').style.animation = 'none';
    document.getElementById('hint').offsetHeight;
    document.getElementById('hint').style.animation = 'revealPop .4s cubic-bezier(0.34,1.56,0.64,1)';
  }
});

socket.on('secret-word:reveal', ({ word }) => {
  showFullWord(word);
  stopTimer();
});

socket.on('secret-word:winner', (winner) => {
  // show winner
  const avEl = document.getElementById('winner-av');
  if (winner.avatar) avEl.innerHTML = `<img src="${winner.avatar}" onerror="this.parentElement.textContent='🏆'">`;
  else avEl.textContent = '🏆';
  document.getElementById('winner-name').textContent = winner.name;
  document.getElementById('winner-banner').classList.add('show');
  fireConfetti();
  fetch(`/api/secret-word/${cfg.username}`).then(r=>r.json()).then(d => renderLeaderboard(d.allWinners || []));
});

socket.on('secret-word:stopped', () => {
  hideReveal();
  stopTimer();
  document.getElementById('letters-row').innerHTML = '';
  document.getElementById('timer-row').style.display = 'none';
  document.getElementById('hint').style.display = 'none';
  document.getElementById('category').style.display = 'none';
  document.getElementById('winner-banner').classList.remove('show');
  document.getElementById('box').classList.remove('show');
});

function renderLetters(length, revealedIndices, letters) {
  const row = document.getElementById('letters-row');
  currentLetters = letters || new Array(length).fill(null);
  let html = '';
  for (let i = 0; i < length; i++) {
    const letter = currentLetters[i];
    const cls = letter ? 'letter-box revealed' : 'letter-box';
    html += `<div class="${cls}" id="lb-${i}">${letter || ''}</div>`;
  }
  row.innerHTML = html;
}

function updateLetters(revealedIndices, letters) {
  currentLetters = letters;
  for (let i = 0; i < letters.length; i++) {
    const el = document.getElementById(`lb-${i}`);
    if (!el) continue;
    if (letters[i] && !el.classList.contains('revealed')) {
      el.textContent = letters[i];
      el.classList.add('revealed');
    }
  }
}

function showFullWord(word) {
  const letters = word.split('');
  const row = document.getElementById('letters-row');
  let html = '';
  for (let i = 0; i < letters.length; i++) {
    html += `<div class="letter-box final" style="animation-delay:${i*0.05}s">${letters[i]}</div>`;
  }
  row.innerHTML = html;
  document.getElementById('reveal-word').textContent = word;
  document.getElementById('reveal-badge').classList.add('show');
}

function hideReveal() {
  document.getElementById('reveal-badge').classList.remove('show');
}

function startTimer(remaining, duration) {
  endTime = Date.now() + remaining * 1000;
  totalDuration = duration || remaining;
  document.getElementById('timer-row').style.display = 'flex';
  if (timerInt) clearInterval(timerInt);
  updateTimer();
  timerInt = setInterval(updateTimer, 200);
}

function stopTimer() { if (timerInt) clearInterval(timerInt); timerInt = null; }

function updateTimer() {
  const remMs = Math.max(0, endTime - Date.now());
  const sec = Math.ceil(remMs / 1000);
  const fg = document.getElementById('timer-fg');
  const text = document.getElementById('timer-text');
  text.textContent = sec;
  const ratio = Math.max(0, Math.min(1, remMs / (totalDuration*1000)));
  fg.style.strokeDashoffset = String(CIRCLE * (1 - ratio));
  fg.classList.remove('warn','danger');
  text.classList.remove('danger');
  if (sec <= 3 && sec > 0) { fg.classList.add('danger'); text.classList.add('danger'); }
  else if (sec <= 7 && sec > 0) { fg.classList.add('warn'); }
  if (remMs <= 0) { clearInterval(timerInt); timerInt = null; }
}

function renderLeaderboard(list) {
  const el = document.getElementById('lb-items');
  const top5 = (list || []).slice(0, 5);
  const slots = [];
  for (let i = 0; i < 5; i++) {
    const w = top5[i]; const rank = i + 1;
    if (w) {
      const av = w.avatar ? `<img src="${w.avatar}" onerror="this.parentElement.textContent='${esc((w.name||'؟')[0])}'">` : esc((w.name||'؟')[0]);
      slots.push(`<div class="lb-item rank-${rank}"><span class="lb-rank">${['🥇','🥈','🥉','4️⃣','5️⃣'][i]}</span><div class="lb-av2">${av}</div><span class="lb-name2">${esc(w.name)}</span><span class="lb-count2">${w.totalWins} 🏆</span></div>`);
    } else {
      slots.push(`<div class="lb-item empty"><span class="lb-rank">${['🥇','🥈','🥉','4️⃣','5️⃣'][i]}</span><div class="lb-av2">?</div><span class="lb-empty-name">—</span></div>`);
    }
  }
  el.innerHTML = slots.join('');
}

function fireConfetti() {
  const layer = document.getElementById('confetti-layer');
  const box = document.getElementById('box');
  const colors = ['#a855f7','#fbbf24','#1dba72','#ff0050','#25f4ee','#ec4899'];
  const cx = box.offsetWidth / 2, cy = box.offsetHeight / 2;
  for (let i = 0; i < 35; i++) {
    const p = document.createElement('div');
    p.style.cssText = `position:absolute;width:8px;height:12px;left:${cx}px;top:${cy}px;background:${colors[i%colors.length]};border-radius:2px;`;
    layer.appendChild(p);
    const angle = Math.random() * Math.PI * 2;
    const dist = 100 + Math.random() * 220;
    p.animate([
      { transform:'translate(0,0) rotate(0deg)', opacity:1 },
      { transform:`translate(${Math.cos(angle)*dist}px, ${Math.sin(angle)*dist}px) rotate(${720+Math.random()*720}deg)`, opacity:0 }
    ], { duration:1500+Math.random()*500, easing:'cubic-bezier(0.4,0,0.6,1)' });
    setTimeout(() => p.remove(), 2100);
  }
}
</script>
<script src="/rules-overlay.js"></script>
</body>
</html>
