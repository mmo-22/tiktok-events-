<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>الجليد - تحكم</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
<script src="/socket.io/socket.io.js"></script>
<style>
  :root{--bg:#0d0d14;--surface:#181824;--surface2:#242436;--border:#2d2d40;--text:#f0f0f5;--muted:#9a9ab0;--ice:#38bdf8;--red:#ef4444;--green:#22c55e;--gold:#fbbf24}
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:var(--bg);color:var(--text);font-family:'Tajawal',sans-serif;padding:20px;min-height:100vh}
  .wrap{max-width:800px;margin:0 auto;display:flex;flex-direction:column;gap:14px}
  .header{display:flex;justify-content:space-between;align-items:center;padding:14px 18px;background:var(--surface);border-radius:12px}
  .header h1{font-size:22px}
  .badge{font-size:12px;padding:4px 12px;border-radius:20px;background:var(--surface2);color:var(--muted)}
  .badge.active{background:var(--ice);color:#000}
  .card{background:var(--surface);border-radius:14px;padding:16px;border:1px solid var(--border)}
  .card-title{font-size:15px;font-weight:700;margin-bottom:12px;color:var(--ice)}
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
  .field{margin-bottom:12px}
  .field label{display:block;font-size:13px;color:var(--muted);margin-bottom:6px}
  .field input{width:100%;padding:10px 12px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:inherit;font-size:14px}
  .btn{padding:11px 16px;border:none;border-radius:10px;font-family:inherit;font-weight:700;cursor:pointer;font-size:14px}
  .actions{display:flex;gap:8px}
  .stats-cards{display:flex;gap:10px;margin-bottom:14px}
  .stat-card{flex:1;background:var(--surface2);border-radius:10px;padding:14px;text-align:center}
  .stat-card-num{font-size:28px;font-weight:900}
  .stat-card-label{font-size:11px;color:var(--muted);margin-top:2px}
  .word-bank{display:flex;flex-wrap:wrap;gap:4px;max-height:120px;overflow-y:auto;margin-bottom:12px}
  .word-chip{padding:4px 10px;background:var(--surface2);border:1px solid var(--border);border-radius:6px;cursor:pointer;font-size:12px;color:var(--muted);font-family:inherit;transition:all .15s}
  .word-chip:hover{border-color:var(--ice);color:var(--ice)}
  .word-chip.used{opacity:.2}
  .empty{text-align:center;padding:24px;color:var(--muted);font-size:13px}
  .overlay-link{background:var(--surface2);padding:10px;border-radius:8px;font-family:monospace;font-size:12px;word-break:break-all;cursor:pointer}
</style>
</head>
<body>
<div class="wrap">
  <div class="header"><h1>🧊 الجليد</h1><span class="badge" id="status-badge">متوقف</span></div>

  <div class="stats-cards">
    <div class="stat-card"><div class="stat-card-num" id="s-total">0</div><div class="stat-card-label">إجمالي</div></div>
    <div class="stat-card"><div class="stat-card-num" id="s-alive" style="color:var(--green)">0</div><div class="stat-card-label">باقي</div></div>
    <div class="stat-card"><div class="stat-card-num" id="s-round" style="color:var(--ice)">0</div><div class="stat-card-label">الجولة</div></div>
    <div class="stat-card"><div class="stat-card-num" id="s-frozen" style="color:var(--red)">0</div><div class="stat-card-label">تجمدوا</div></div>
  </div>

  <div class="card">
    <div class="card-title">📝 المرحلة 1: التسجيل</div>
    <div class="row3">
      <div class="field"><label>كلمة التسجيل</label><input type="text" id="keyword" value="جليد"></div>
      <div class="field"><label>الوقت لكل جولة (ثواني)</label><input type="number" id="answer-time" value="15" min="5" max="60"></div>
      <div class="field"><label>الحد الأقصى للاعبين</label><input type="number" id="max-players" value="20" min="4" max="100"></div>
    </div>
    <div class="actions">
      <button class="btn" onclick="openRegistration()" style="flex:1;background:var(--ice);color:#000">📝 فتح التسجيل</button>
      <button class="btn" onclick="lockRegistration()" style="flex:1;background:var(--red);color:#fff">🔒 إيقاف التسجيل</button>
    </div>
  </div>

  <div class="card">
    <div class="card-title">❄️ المرحلة 2: جمّد!</div>
    <div class="field"><label>الكلمة السرية</label><input type="text" id="word-input" placeholder="اكتب الكلمة اللي لازم يكتبونها..."></div>
    <div class="word-bank" id="word-bank"></div>
    <div class="actions">
      <button class="btn" onclick="freeze()" style="flex:1;background:var(--ice);color:#000;font-size:16px">❄️ جمّد الكل!</button>
      <button class="btn" onclick="randomWord()" style="background:var(--gold);color:#000">🎲</button>
      <button class="btn" onclick="stopGame()" style="background:var(--red);color:#fff">⏹</button>
    </div>
  </div>

  <div class="card">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
      <div class="card-title" style="margin-bottom:0">👥 اللاعبين (<span id="player-count">0</span>)</div>
    </div>
    <div id="player-list" style="max-height:200px;overflow-y:auto"><div class="empty">لا يوجد لاعبين</div></div>
  </div>

  <div class="card">
    <div class="card-title">🔗 رابط الـ Overlay</div>
    <div style="display:flex;gap:8px;align-items:center">
      <div class="overlay-link" id="overlay-link" style="flex:1">—</div>
      <button class="btn" onclick="copyLink()" style="background:var(--ice);color:#000;padding:10px 16px;font-size:13px">📋 نسخ</button>
    </div>
  </div>
</div>
<script>
var params=new URLSearchParams(location.search),username=params.get('username')||'';
var socket=io();if(username)socket.emit('join',{username});
document.getElementById('overlay-link').textContent=location.origin+'/ice-overlay.html?username='+username;
function copyLink(){navigator.clipboard.writeText(document.getElementById('overlay-link').textContent);document.getElementById('overlay-link').style.borderColor='var(--ice)';setTimeout(function(){document.getElementById('overlay-link').style.borderColor='';},1000);}

var WORDS=['ثلج','بارد','جليد','ماء','نار','شمس','حار','صيف','شتاء','قمر','نجم','سحاب','مطر','رعد','برق','هواء','بحر','جبل','شجرة','ورد','قهوة','شاي','حليب','موز','تفاح','برتقال','ليمون','فراولة','كرز','عنب','بطيخ','كيك','بيتزا','برجر','سيارة','طائرة','قطار','صاروخ','كتاب','قلم','ساعة','هاتف','نظارة','مفتاح','باب','كرسي','طاولة','سرير','قلب','نجمة'];
var usedWords=new Set();

function renderBank(){
  document.getElementById('word-bank').innerHTML=WORDS.map(function(w,i){
    return '<span class="word-chip '+(usedWords.has(i)?'used':'')+'" onclick="pickWord('+i+')">'+w+'</span>';
  }).join('');
}
function pickWord(i){document.getElementById('word-input').value=WORDS[i];usedWords.add(i);renderBank();}
function randomWord(){var pool=WORDS.map(function(w,i){return{w,idx:i};}).filter(function(w){return!usedWords.has(w.idx);});if(!pool.length){usedWords.clear();pool=WORDS.map(function(w,i){return{w,idx:i};});}pickWord(pool[Math.floor(Math.random()*pool.length)].idx);}

async function openRegistration(){
  var maxPlayers = parseInt(document.getElementById('max-players').value) || 20;
  await fetch('/api/ice/register',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username,keyword:document.getElementById('keyword').value.trim(),maxPlayers})});
  document.getElementById('status-badge').textContent='📝 تسجيل';
  document.getElementById('status-badge').classList.add('active');
  document.getElementById('player-list').innerHTML='<div class="empty">بانتظار اللاعبين...</div>';
  document.getElementById('player-count').textContent='0';
  loadStats();
}

async function lockRegistration(){
  await fetch('/api/ice/lock',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username})});
  document.getElementById('status-badge').textContent='🔒 جاهز';
  loadStats();
}

async function freeze(){
  var word=document.getElementById('word-input').value.trim();
  if(!word){alert('اكتب الكلمة');return;}
  var time=parseInt(document.getElementById('answer-time').value)||15;
  await fetch('/api/ice/freeze',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username,word,answerTime:time})});
  document.getElementById('status-badge').textContent='❄️ متجمدين!';
}

async function stopGame(){
  await fetch('/api/ice/stop',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username})});
  document.getElementById('status-badge').textContent='متوقف';
  document.getElementById('status-badge').classList.remove('active');
}

async function loadStats(){
  var res=await fetch('/api/ice/'+username);var d=await res.json();
  document.getElementById('s-total').textContent=d.totalPlayers||0;
  document.getElementById('s-alive').textContent=d.aliveCount||0;
  document.getElementById('s-round').textContent=d.round||0;
  document.getElementById('s-frozen').textContent=(d.losers||[]).length;
  document.getElementById('player-count').textContent=d.totalPlayers||0;
  // Render player list
  var el=document.getElementById('player-list');
  var players=d.players||[];
  if(!players.length){el.innerHTML='<div class="empty">لا يوجد لاعبين</div>';return;}
  var losersNames=(d.losers||[]).map(function(l){return l.name;});
  el.innerHTML=players.map(function(p){
    var isDead=losersNames.indexOf(p.name)>=0;
    return '<div style="display:flex;align-items:center;gap:8px;padding:6px 10px;background:var(--surface2);border-radius:8px;margin-bottom:3px;font-size:13px;'+(isDead?'opacity:.4;text-decoration:line-through':'')+'"><span>'+(isDead?'❌':'✅')+'</span><span style="flex:1;font-weight:700">'+esc(p.name)+'</span></div>';
  }).join('');
}

socket.on('ice:joined',function(){loadStats();});
socket.on('ice:unfreeze',function(){loadStats();});
socket.on('ice:locked',function(){loadStats();document.getElementById('status-badge').textContent='🔒 جاهز';});
socket.on('ice:round-end',function(d){
  loadStats();
  if(d.winner){document.getElementById('status-badge').textContent='🏆 فائز!';}
});

renderBank();if(username)loadStats();
</script>
<script src="/rules-control.js"></script>
</body>
</html>
