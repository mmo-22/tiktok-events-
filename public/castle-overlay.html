<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>Castle War Overlay</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
<script src="/socket.io/socket.io.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{background:transparent;width:100vw;height:100vh;font-family:'Tajawal',sans-serif;overflow:hidden;display:flex;align-items:center;justify-content:center}
.main{position:relative;background:rgba(0,0,0,.92);border:2px solid rgba(168,85,247,.4);border-radius:22px;padding:22px 24px;width:620px;opacity:0;transition:opacity .15s;overflow:hidden}
.main.show{opacity:1}
.main::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,#ef4444,#a855f7,#3b82f6)}

.title{font-size:15px;color:rgba(255,255,255,.4);text-align:center;margin-bottom:8px}.title span{color:#a855f7;font-weight:900}
.phase-label{text-align:center;font-size:14px;color:#fbbf24;font-weight:700;margin-bottom:14px}

.castles{display:flex;gap:14px;margin-bottom:14px}
.castle{flex:1;border-radius:14px;padding:14px;text-align:center;position:relative;overflow:hidden}
.castle.red{background:rgba(239,68,68,.08);border:2px solid rgba(239,68,68,.3)}
.castle.blue{background:rgba(59,130,246,.08);border:2px solid rgba(59,130,246,.3)}
.castle-icon{font-size:36px;margin-bottom:6px}
.castle-name{font-size:14px;font-weight:700;margin-bottom:8px}
.castle.red .castle-name{color:#ef4444}
.castle.blue .castle-name{color:#3b82f6}

.hp-bar{height:16px;background:rgba(255,255,255,.08);border-radius:8px;overflow:hidden;margin-bottom:6px}
.hp-fill{height:100%;border-radius:8px;transition:width .3s ease}
.hp-fill.red{background:linear-gradient(90deg,#dc2626,#ef4444)}
.hp-fill.blue{background:linear-gradient(90deg,#2563eb,#3b82f6)}
.hp-fill.low{animation:hpPulse .5s ease infinite}
@keyframes hpPulse{0%,100%{opacity:1}50%{opacity:.5}}

.hp-text{font-size:20px;font-weight:900;color:#fff}
.hp-sub{font-size:11px;color:rgba(255,255,255,.3)}
.atk-count{font-size:12px;color:rgba(255,255,255,.4);margin-top:4px}

.vs-badge{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(168,85,247,.2);border:2px solid rgba(168,85,247,.4);border-radius:50%;width:44px;height:44px;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:900;color:#a855f7;z-index:2}

.feed{display:flex;flex-direction:column;gap:3px;max-height:60px;overflow:hidden}
.feed-item{padding:4px 10px;border-radius:6px;font-size:11px;font-weight:600;animation:slideIn .2s ease}
.feed-item.red-atk{background:rgba(239,68,68,.08);color:#ef4444}
.feed-item.blue-atk{background:rgba(59,130,246,.08);color:#3b82f6}
@keyframes slideIn{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}

.reg-info{text-align:center;font-size:14px;color:rgba(255,255,255,.5);margin-bottom:10px}
.reg-info strong{color:#fff}

.winner-overlay{position:absolute;inset:0;background:rgba(0,0,0,.88);backdrop-filter:blur(12px);display:none;flex-direction:column;align-items:center;justify-content:center;border-radius:22px;z-index:10}
.winner-overlay.show{display:flex;animation:winIn .5s ease}
.winner-icon{font-size:52px;margin-bottom:8px}
.winner-text{font-size:26px;font-weight:900}
.winner-sub{font-size:14px;color:rgba(255,255,255,.4);margin-top:4px}
.winner-stats{display:flex;gap:20px;margin-top:12px;font-size:13px;color:rgba(255,255,255,.5)}
@keyframes winIn{from{opacity:0;transform:scale(.8)}to{opacity:1;transform:scale(1)}}

.confetti{position:absolute;inset:0;pointer-events:none;overflow:hidden}
</style>
</head>
<body>
<div class="main" id="box">
  <div class="title">🏰 <span>حرب القلاع</span></div>
  <div class="phase-label" id="phase-label"></div>
  <div class="reg-info" id="reg-info" style="display:none">اكتب <strong>1</strong> للأحمر أو <strong>2</strong> للأزرق</div>
  <div id="reg-slots" style="display:none;display:flex;flex-wrap:wrap;justify-content:center;gap:4px;margin-bottom:10px;max-height:36px;overflow:hidden"></div>
  <div style="position:relative">
    <div class="castles">
      <div class="castle red">
        <div class="castle-icon">🏰</div>
        <div class="castle-name">🔴 الأحمر (<span id="red-count">0</span>)</div>
        <div class="hp-bar"><div class="hp-fill red" id="red-hp-fill" style="width:100%"></div></div>
        <div class="hp-text" id="red-hp-text">100</div>
        <div class="atk-count">⚔️ <span id="red-atk">0</span> هجوم</div>
      </div>
      <div class="castle blue">
        <div class="castle-icon">🏰</div>
        <div class="castle-name">🔵 الأزرق (<span id="blue-count">0</span>)</div>
        <div class="hp-bar"><div class="hp-fill blue" id="blue-hp-fill" style="width:100%"></div></div>
        <div class="hp-text" id="blue-hp-text">100</div>
        <div class="atk-count">⚔️ <span id="blue-atk">0</span> هجوم</div>
      </div>
    </div>
    <div class="vs-badge">VS</div>
  </div>
  <div class="feed" id="feed"></div>
  <div class="winner-overlay" id="winner-overlay">
    <div class="winner-icon" id="w-icon">🏆</div>
    <div class="winner-text" id="w-text"></div>
    <div class="winner-sub">دمّر القلعة!</div>
    <div class="winner-stats" id="w-stats"></div>
  </div>
  <div class="confetti" id="confetti"></div>
</div>
<script>
var params=new URLSearchParams(location.search),username=params.get('username')||'';
var socket=io();if(username)socket.emit('join',{username});
var maxHP=100;
var CC=['#ef4444','#3b82f6','#a855f7','#fbbf24','#22c55e','#ec4899'];

socket.on('castle:register',function(d){
  document.getElementById('box').classList.add('show');
  document.getElementById('winner-overlay').classList.remove('show');
  document.getElementById('phase-label').textContent='📝 اختر فريقك!';
  document.getElementById('reg-info').style.display='block';
  document.getElementById('reg-slots').style.display='flex';
  document.getElementById('reg-slots').innerHTML='';
  maxHP=d.maxHP||100;
  document.getElementById('red-hp-fill').style.width='100%';
  document.getElementById('blue-hp-fill').style.width='100%';
  document.getElementById('red-hp-text').textContent=maxHP;
  document.getElementById('blue-hp-text').textContent=maxHP;
  document.getElementById('red-count').textContent='0';
  document.getElementById('blue-count').textContent='0';
  document.getElementById('red-atk').textContent='0';
  document.getElementById('blue-atk').textContent='0';
  document.getElementById('feed').innerHTML='';
});

socket.on('castle:joined',function(d){
  document.getElementById('red-count').textContent=d.redCount;
  document.getElementById('blue-count').textContent=d.blueCount;
  var el=document.getElementById('reg-slots');
  var color=d.team==='red'?'#ef4444':'#3b82f6';
  var div=document.createElement('div');
  div.style.cssText='width:28px;height:28px;border-radius:50%;border:2px solid '+color+';overflow:hidden;animation:winIn .3s ease';
  if(d.avatar){div.innerHTML='<img src="'+d.avatar+'" style="width:100%;height:100%;object-fit:cover">';}
  else{div.style.cssText+='display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,.1);font-size:10px;color:rgba(255,255,255,.4)';div.textContent='✓';}
  el.appendChild(div);
});

socket.on('castle:locked',function(d){
  document.getElementById('reg-info').style.display='none';
  document.getElementById('reg-slots').style.display='none';
  document.getElementById('phase-label').textContent='🔒 التسجيل مقفل — '+d.total+' لاعب';
});

socket.on('castle:battle',function(d){
  document.getElementById('phase-label').textContent='⚔️ المعركة بدأت! اكتب أي شيء!';
  document.getElementById('reg-info').style.display='none';
  maxHP=d.maxHP||100;
});

socket.on('castle:attack',function(d){
  maxHP=d.maxHP||100;
  var rPct=Math.max(0,d.redHP/maxHP*100);
  var bPct=Math.max(0,d.blueHP/maxHP*100);
  document.getElementById('red-hp-fill').style.width=rPct+'%';
  document.getElementById('blue-hp-fill').style.width=bPct+'%';
  if(rPct<25)document.getElementById('red-hp-fill').classList.add('low');
  if(bPct<25)document.getElementById('blue-hp-fill').classList.add('low');
  document.getElementById('red-hp-text').textContent=d.redHP;
  document.getElementById('blue-hp-text').textContent=d.blueHP;
  document.getElementById('red-atk').textContent=d.redAttacks;
  document.getElementById('blue-atk').textContent=d.blueAttacks;
  // Feed
  var el=document.getElementById('feed');
  var div=document.createElement('div');
  div.className='feed-item '+(d.team==='red'?'red-atk':'blue-atk');
  var icon=d.team==='red'?'🔴':'🔵';
  div.textContent=icon+' '+d.attacker+' ⚔️';
  el.prepend(div);while(el.children.length>4)el.removeChild(el.lastChild);
});

socket.on('castle:finish',function(d){
  var color=d.winner==='red'?'#ef4444':'#3b82f6';
  var name=d.winner==='red'?'🔴 الأحمر':'🔵 الأزرق';
  document.getElementById('phase-label').textContent='🏆 انتهت المعركة!';
  document.getElementById('w-icon').textContent='🏰';
  document.getElementById('w-text').textContent=name+' فاز!';
  document.getElementById('w-text').style.color=color;
  document.getElementById('w-stats').innerHTML='🔴 '+d.redAttacks+' هجوم &nbsp;|&nbsp; 🔵 '+d.blueAttacks+' هجوم';
  document.getElementById('winner-overlay').classList.add('show');
  fireConfetti();
});

socket.on('castle:stopped',function(){document.getElementById('box').classList.remove('show');});

function fireConfetti(){var layer=document.getElementById('confetti'),box=document.getElementById('box'),cx=box.offsetWidth/2,cy=box.offsetHeight/2;for(var i=0;i<40;i++){var p=document.createElement('div');p.style.cssText='position:absolute;width:7px;height:11px;left:'+cx+'px;top:'+cy+'px;background:'+CC[i%CC.length]+';border-radius:2px;';layer.appendChild(p);var a=Math.random()*Math.PI*2,d=80+Math.random()*220;p.animate([{transform:'translate(0,0) rotate(0deg)',opacity:1},{transform:'translate('+Math.cos(a)*d+'px,'+Math.sin(a)*d+'px) rotate('+(600+Math.random()*600)+'deg)',opacity:0}],{duration:1400+Math.random()*500,easing:'cubic-bezier(0.4,0,0.6,1)'});setTimeout(function(el){el.remove()}.bind(null,p),2000);}}
</script>
<script src="/rules-overlay.js"></script>
</body>
</html>
