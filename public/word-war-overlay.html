<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>⚔️ حرب الكلمات</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
<script src="/socket.io/socket.io.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body.mobile{transform:scale(0.55);transform-origin:center center}
html,body{background:transparent !important;width:100vw;height:100vh;font-family:'Tajawal',sans-serif;overflow:hidden;display:flex;align-items:center;justify-content:center}

.main{position:relative;width:min(96vw,700px);aspect-ratio:16/10.5;opacity:0;pointer-events:none;transition:opacity .2s}
.main.show{opacity:1}
.scene{position:absolute;inset:0;border-radius:18px;overflow:hidden;border:2px solid rgba(245,197,66,.3);
  background:radial-gradient(ellipse at 20% 30%,#1e0a0a 0%,#06060b 55%),radial-gradient(ellipse at 80% 70%,#0a1430 0%,transparent 55%);
  box-shadow:0 0 30px rgba(0,0,0,.6)}
.scene.shake{animation:shk .35s}
@keyframes shk{0%,100%{transform:translate(0)}25%{transform:translate(-5px,3px)}50%{transform:translate(5px,-3px)}75%{transform:translate(-3px,-2px)}}

/* الجانبين */
.ww-side{position:absolute;top:34px;bottom:44px;width:50%;display:flex;flex-direction:column;align-items:center;padding-top:6px}
.ww-r{right:0}.ww-l{left:0}
.ww-title{font-weight:900;font-size:.88rem;padding:4px 16px;border-radius:20px;margin-bottom:5px;white-space:nowrap;z-index:4}
.ww-r .ww-title{background:rgba(239,68,68,.18);color:#fca5a5;border:1px solid #7f1d1d}
.ww-l .ww-title{background:rgba(59,130,246,.18);color:#93c5fd;border:1px solid #1e3a8a}
.ww-score{font-size:1.9rem;font-weight:900;color:#fff;line-height:1;margin-bottom:4px;z-index:4;text-shadow:0 2px 8px rgba(0,0,0,.7)}
.hp{width:76%;height:13px;background:#111122;border-radius:10px;overflow:hidden;border:1px solid #222;z-index:4}
.hp i{display:block;height:100%;transition:width .5s;width:100%}
.ww-r .hp i{background:linear-gradient(90deg,#ef4444,#f97316)}
.ww-l .hp i{background:linear-gradient(90deg,#3b82f6,#22d3ee)}
.ww-words{flex:1;width:100%;position:relative}
.ww-words.reg-mode{display:flex;flex-wrap:wrap;align-content:center;justify-content:center;gap:4px;padding:10px}
.w-card{position:absolute;background:#0c0c16ee;border:1px solid;border-radius:10px;padding:5px 12px;font-weight:900;font-size:.82rem;opacity:0;white-space:nowrap;display:flex;align-items:center;gap:5px;max-width:90%}
.w-card img{width:18px;height:18px;border-radius:50%;object-fit:cover}
.ww-r .w-card{border-color:#ef4444;color:#fca5a5}
.ww-l .w-card{border-color:#3b82f6;color:#93c5fd}
@keyframes pop{0%{opacity:0;transform:scale(.4)}20%{opacity:1;transform:scale(1.12)}30%{transform:scale(1)}80%{opacity:1}100%{opacity:0;transform:translateY(-18px)}}
.reg-av{width:30px;height:30px;border-radius:50%;overflow:hidden;border:2px solid;animation:regPop .3s ease;flex-shrink:0;display:inline-flex;align-items:center;justify-content:center;background:rgba(255,255,255,.08);font-size:.6rem;color:rgba(255,255,255,.5)}
.ww-r .reg-av{border-color:#ef4444}
.ww-l .reg-av{border-color:#3b82f6}
.reg-av img{width:100%;height:100%;object-fit:cover}
@keyframes regPop{0%{transform:scale(0);opacity:0}100%{transform:scale(1);opacity:1}}

/* الوسط */
.ww-vs{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:2rem;font-weight:900;color:#f5c542;text-shadow:0 0 24px rgba(245,197,66,.7);z-index:5}
.bolt{position:absolute;top:12%;bottom:12%;left:50%;width:3px;background:linear-gradient(#f5c542,transparent 30%,#f5c542 50%,transparent 70%,#f5c542);transform:translateX(-50%);opacity:.5;z-index:3}

/* HUD أعلى */
.category-bar{position:absolute;top:6px;left:50%;transform:translateX(-50%);z-index:8;text-align:center;font-size:.9rem;font-weight:900;color:#fbbf24;background:#0c0c16dd;border:1px solid rgba(251,191,36,.35);border-radius:12px;padding:4px 18px;white-space:nowrap;max-width:80%;overflow:hidden;text-overflow:ellipsis}
.join-kw{position:absolute;top:36px;left:50%;transform:translateX(-50%);z-index:8;font-size:.7rem;font-weight:900;background:#0c0c16cc;border-radius:10px;padding:3px 12px;display:none;white-space:nowrap;color:rgba(255,255,255,.7)}

/* أسفل: المؤقت */
.timer-row{position:absolute;bottom:8px;left:14px;right:14px;display:none;align-items:center;gap:10px;z-index:8}
.timer-bar{flex:1;height:8px;background:rgba(255,255,255,.1);border-radius:99px;overflow:hidden;border:1px solid rgba(0,0,0,.4)}
.timer-fill{height:100%;background:#fbbf24;border-radius:99px;transition:width .3s linear}
.timer-fill.warn{background:#f59e0b}
.timer-fill.danger{background:#ef4444}
.timer-num{font-size:1.1rem;font-weight:900;color:#fff;font-variant-numeric:tabular-nums;min-width:36px;text-align:center;text-shadow:0 2px 6px #000}

/* النتيجة */
.result-banner{display:none;text-align:center;position:absolute;inset:0;z-index:10;flex-direction:column;align-items:center;justify-content:center;backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px)}
.result-banner.show{display:flex;animation:chipPop .5s cubic-bezier(0.34,1.56,0.64,1)}
.result-banner.red-win{background:rgba(239,68,68,.28)}
.result-banner.blue-win{background:rgba(59,130,246,.28)}
.result-banner.tie{background:rgba(251,191,36,.25)}
.result-text{font-size:1.8rem;font-weight:900;color:#fff;text-shadow:0 2px 10px rgba(0,0,0,.6)}
.result-sub{font-size:1rem;color:rgba(255,255,255,.75);margin-top:8px;font-weight:900}
@keyframes chipPop{0%{transform:scale(0);opacity:0}100%{transform:scale(1);opacity:1}}
@keyframes joinPop{0%{transform:translateX(-50%) translateY(-20px) scale(.8);opacity:0}100%{transform:translateX(-50%) translateY(0) scale(1);opacity:1}}

.confetti-layer{position:absolute;inset:0;pointer-events:none;overflow:hidden;z-index:11}
</style>
</head>
<body>
<div class="main" id="box">
  <div class="scene" id="scene">
    <div class="bolt"></div>
    <div class="ww-vs">VS</div>
    <div class="category-bar" id="category">—</div>
    <div class="join-kw" id="join-keywords"></div>

    <div class="ww-side ww-r">
      <div class="ww-title" id="red-label">🔴 الأحمر</div>
      <div class="ww-score" id="red-score">0</div>
      <div class="hp"><i id="hp-r"></i></div>
      <div class="ww-words" id="red-words"></div>
    </div>
    <div class="ww-side ww-l">
      <div class="ww-title" id="blue-label">🔵 الأزرق</div>
      <div class="ww-score" id="blue-score">0</div>
      <div class="hp"><i id="hp-l"></i></div>
      <div class="ww-words" id="blue-words"></div>
    </div>

    <div class="timer-row" id="timer-row">
      <div class="timer-num" id="timer-num">60</div>
      <div class="timer-bar"><div class="timer-fill" id="timer-fill" style="width:100%"></div></div>
    </div>

    <div class="result-banner" id="result-banner">
      <div class="result-text" id="result-text"></div>
      <div class="result-sub" id="result-sub"></div>
    </div>
    <div class="confetti-layer" id="confetti-layer"></div>
  </div>
</div>

<script>
if(new URLSearchParams(location.search).get("mobile")==="1")document.body.classList.add("mobile");
const params = new URLSearchParams(location.search);
const cfg = { username: params.get('username') || '' };
const socket = io({ transports:['websocket','polling'], reconnection:true });
let timerInt = null, endTime = 0, totalDuration = 60;

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

/* HP يمثل فارق النقاط: المتأخر ينزف */
function updateScores(r, b) {
  r = r || 0; b = b || 0;
  document.getElementById('red-score').textContent = r;
  document.getElementById('blue-score').textContent = b;
  var redHP  = Math.max(8, 100 - Math.max(0, b - r) * 5);
  var blueHP = Math.max(8, 100 - Math.max(0, r - b) * 5);
  document.getElementById('hp-r').style.width = redHP + '%';
  document.getElementById('hp-l').style.width = blueHP + '%';
}

function shakeScene(){
  var sc=document.getElementById('scene');
  sc.classList.remove('shake');void sc.offsetWidth;sc.classList.add('shake');
  setTimeout(function(){sc.classList.remove('shake');},380);
}

/* بطاقة كلمة تنبثق بموقع عشوائي بجهة الفريق */
function spawnWordCard(team, word, avatar){
  var box = document.getElementById(team + '-words');
  if (box.classList.contains('reg-mode')) return;
  var c = document.createElement('div');
  c.className = 'w-card';
  c.innerHTML = (avatar ? '<img src="'+esc(avatar)+'" onerror="this.remove()">' : '💥 ') + esc(word);
  c.style.right = (8 + Math.random()*45) + '%';
  c.style.top = (8 + Math.random()*68) + '%';
  c.style.animation = 'pop 1.4s forwards';
  box.appendChild(c);
  setTimeout(function(){ c.remove(); }, 1400);
}

function joinRoom() {
  if (!cfg.username) return;
  socket.emit('join', { username: cfg.username });
  fetch(`/api/word-war/${cfg.username}`).then(r=>r.json()).then(d => {
    if (d.active) {
      document.getElementById('category').textContent = d.category;
      updateScores(d.redScore, d.blueScore);
      (d.redWords||[]).slice(-3).forEach(w => spawnWordCard('red', w));
      (d.blueWords||[]).slice(-3).forEach(w => spawnWordCard('blue', w));
      const remMs = Math.max(0, d.endTime - Date.now());
      document.getElementById('timer-row').style.display = 'flex';
      startTimer(Math.ceil(remMs/1000), d.duration);
      document.getElementById('box').classList.add('show');
    }
    if (d.registrationOpen) {
      const kw = document.getElementById('join-keywords');
      kw.innerHTML = '📝 سجل الآن! — <span style="color:#fca5a5">🔴 اكتب "' + esc(d.redKeyword||'أحمر') + '"</span> أو <span style="color:#93c5fd">🔵 اكتب "' + esc(d.blueKeyword||'أزرق') + '"</span>';
      kw.style.display = 'block';
      document.getElementById('category').textContent = '📝 مرحلة التسجيل';
      document.getElementById('timer-row').style.display = 'none';
      document.getElementById('red-words').classList.add('reg-mode');
      document.getElementById('blue-words').classList.add('reg-mode');
      updateScores(d.redScore || 0, d.blueScore || 0);
      document.getElementById('box').classList.add('show');
    }
  });
}
socket.on('connect', joinRoom);
joinRoom();

socket.on('word-war:start', ({ category, duration, redKeyword, blueKeyword, redScore, blueScore }) => {
  playerWordCounts = {};
  document.getElementById('category').textContent = category;
  document.getElementById('red-words').classList.remove('reg-mode');
  document.getElementById('blue-words').classList.remove('reg-mode');
  document.getElementById('red-words').innerHTML = '';
  document.getElementById('blue-words').innerHTML = '';
  document.getElementById('result-banner').classList.remove('show','red-win','blue-win','tie');
  updateScores(redScore || 0, blueScore || 0);
  const kw = document.getElementById('join-keywords');
  kw.innerHTML = '<span style="color:#fca5a5">🔴 اكتب "' + esc(redKeyword||'أحمر') + '"</span> — <span style="color:#93c5fd">🔵 اكتب "' + esc(blueKeyword||'أزرق') + '"</span>';
  kw.style.display = 'block';
  totalDuration = duration;
  document.getElementById('timer-row').style.display = 'flex';
  startTimer(duration, duration);
  document.getElementById('box').classList.add('show');
});

var playerWordCounts = {};

socket.on('word-war:word', ({ team, word, player, avatar, redScore, blueScore, totalWords }) => {
  updateScores(redScore, blueScore);
  playerWordCounts[player] = totalWords || ((playerWordCounts[player] || 0) + 1);
  spawnWordCard(team, word, avatar);
  shakeScene();
});

var regVisibleCount = 10;

socket.on('word-war:join', ({ team, player, avatar, redCount, blueCount }) => {
  document.getElementById('red-label').textContent = '🔴 الأحمر (' + redCount + ')';
  document.getElementById('blue-label').textContent = '🔵 الأزرق (' + blueCount + ')';
  showJoinConfirm(team, player);
  var col = document.getElementById(team + '-words');
  if (col && col.classList.contains('reg-mode')) {
    var div = document.createElement('div');
    div.className = 'reg-av';
    if (avatar) {
      div.innerHTML = '<img src="'+esc(avatar)+'" onerror="this.parentElement.textContent=\'?\'">';
    } else {
      div.textContent = '?';
    }
    col.appendChild(div);
    while (col.children.length > regVisibleCount) col.removeChild(col.firstChild);
  }
});

socket.on('word-war:reg-visible', function(d) {
  regVisibleCount = d.count || 10;
});

function showJoinConfirm(team, name) {
  var existing = document.getElementById('join-confirm');
  if (existing) existing.remove();
  var div = document.createElement('div');
  div.id = 'join-confirm';
  var bgColor = team === 'red' ? 'rgba(239,68,68,.9)' : 'rgba(59,130,246,.9)';
  var emoji = team === 'red' ? '🔴' : '🔵';
  div.style.cssText = 'position:fixed;top:20px;left:50%;transform:translateX(-50%);background:' + bgColor + ';color:#fff;padding:10px 24px;border-radius:12px;font-size:14px;font-weight:700;z-index:200;animation:joinPop .4s ease;white-space:nowrap;box-shadow:0 4px 16px rgba(0,0,0,.3)';
  div.textContent = emoji + ' ' + name + ' انضم!';
  document.body.appendChild(div);
  setTimeout(function() { if (div.parentNode) div.remove(); }, 2500);
}

socket.on('word-war:registration', ({ open, redKeyword, blueKeyword }) => {
  const kw = document.getElementById('join-keywords');
  if (open) {
    stopTimer();
    document.getElementById('timer-row').style.display = 'none';
    document.getElementById('result-banner').classList.remove('show','red-win','blue-win','tie');
    kw.innerHTML = '📝 سجل الآن! — <span style="color:#fca5a5">🔴 اكتب "' + esc(redKeyword) + '"</span> أو <span style="color:#93c5fd">🔵 اكتب "' + esc(blueKeyword) + '"</span>';
    kw.style.display = 'block';
    document.getElementById('category').textContent = '📝 مرحلة التسجيل';
    document.getElementById('box').classList.add('show');
    document.getElementById('red-words').innerHTML = '';
    document.getElementById('blue-words').innerHTML = '';
    document.getElementById('red-words').classList.add('reg-mode');
    document.getElementById('blue-words').classList.add('reg-mode');
  }
});

socket.on('word-war:lock', ({ locked }) => {
  const kw = document.getElementById('join-keywords');
  if (locked) { kw.innerHTML = '🔒 التسجيل مقفل'; kw.style.color = '#fca5a5'; }
  else { kw.style.color = 'rgba(255,255,255,.7)'; }
  stopTimer();
  document.getElementById('timer-row').style.display = 'none';
});

socket.on('word-war:teams-cleared', () => {
  stopTimer();
  document.getElementById('timer-row').style.display = 'none';
  updateScores(0, 0);
  document.getElementById('red-words').innerHTML = '';
  document.getElementById('blue-words').innerHTML = '';
  document.getElementById('red-words').classList.remove('reg-mode');
  document.getElementById('blue-words').classList.remove('reg-mode');
  document.getElementById('result-banner').classList.remove('show','red-win','blue-win','tie');
  document.getElementById('red-label').textContent = '🔴 الأحمر (0)';
  document.getElementById('blue-label').textContent = '🔵 الأزرق (0)';
  playerWordCounts = {};
});

socket.on('word-war:end', (result) => {
  stopTimer();
  const banner = document.getElementById('result-banner');
  const text = document.getElementById('result-text');
  const sub = document.getElementById('result-sub');
  banner.classList.remove('red-win','blue-win','tie');
  if (result.winner === 'red') {
    banner.classList.add('red-win');
    text.textContent = '🔴 الفريق الأحمر يفوز!';
    document.getElementById('hp-l').style.width = '0%';
  } else if (result.winner === 'blue') {
    banner.classList.add('blue-win');
    text.textContent = '🔵 الفريق الأزرق يفوز!';
    document.getElementById('hp-r').style.width = '0%';
  } else {
    banner.classList.add('tie');
    text.textContent = '🤝 تعادل!';
  }
  sub.textContent = `${result.redScore} - ${result.blueScore}`;
  banner.classList.add('show');
  fireConfetti();
});

socket.on('word-war:stopped', () => {
  stopTimer();
  document.getElementById('box').classList.remove('show');
});

function startTimer(remaining, duration) {
  endTime = Date.now() + remaining * 1000;
  totalDuration = duration || remaining;
  if (timerInt) clearInterval(timerInt);
  updateTimer();
  timerInt = setInterval(updateTimer, 200);
}
function stopTimer() { if (timerInt) clearInterval(timerInt); timerInt = null; }
function updateTimer() {
  const remMs = Math.max(0, endTime - Date.now());
  const sec = Math.ceil(remMs / 1000);
  const fill = document.getElementById('timer-fill');
  const num = document.getElementById('timer-num');
  num.textContent = sec;
  const ratio = Math.max(0, Math.min(1, remMs / (totalDuration * 1000)));
  fill.style.width = (ratio * 100) + '%';
  fill.classList.remove('warn','danger');
  if (sec <= 5) fill.classList.add('danger');
  else if (sec <= 15) fill.classList.add('warn');
  if (remMs <= 0) { clearInterval(timerInt); timerInt = null; }
}

function fireConfetti() {
  const layer = document.getElementById('confetti-layer');
  const box = document.getElementById('box');
  const colors = ['#ef4444','#3b82f6','#fbbf24','#1dba72','#a855f7','#ec4899'];
  const cx = box.offsetWidth / 2, cy = box.offsetHeight / 2;
  for (let i = 0; i < 40; i++) {
    const p = document.createElement('div');
    p.style.cssText = `position:absolute;width:8px;height:12px;left:${cx}px;top:${cy}px;background:${colors[i%colors.length]};border-radius:2px;`;
    layer.appendChild(p);
    const angle = Math.random() * Math.PI * 2;
    const dist = 100 + Math.random() * 250;
    p.animate([
      { transform:'translate(0,0) rotate(0deg)', opacity:1 },
      { transform:`translate(${Math.cos(angle)*dist}px,${Math.sin(angle)*dist}px) rotate(${720+Math.random()*720}deg)`, opacity:0 }
    ], { duration:1500+Math.random()*500, easing:'cubic-bezier(0.4,0,0.6,1)' });
    setTimeout(() => p.remove(), 2100);
  }
}
</script>
<script src="/rules-overlay.js"></script>
</body>
</html>
